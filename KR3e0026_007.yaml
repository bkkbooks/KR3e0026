front:
  text: 傷寒論音訓
  hash: sha256:6f38238a19c1b2a926be1919139c67e1c274ee7cfb5510c3d676d6367c147833
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0026_WYG_007-1a, image: WYG0738/WYG0738-0661c.png}
body:
  text: 叙論漬疾賜切浸也搏補洛切手擊也瘴之亮切瘴癘脆責嵗切說文曰小而易斷也脫吐活切間音澗撣徒安切觸也涸平洛切水竭也讝之廉切疾而寐語也泄思列切漏也濈壯立切和也汗出也填徒堅切賈逵曰塞也滿也太陽證腰脊强下居亮切尸徑硬也陽明證漐丑入切汗出貌怫扶物切意不舒治也憒公對切亂也怵惕上恥律切悚懼悽愴也下他的切憂也疾也懊憹上於報切悔也少隂證沫亡活切水浮沫也踝胡瓦切足踝也跟柯思切悸其季切心動也厥隂證蛖胡恢切腹中長蟲也可發汗證淅桑激切洗也翕許及切炙也不可發汗證芤若使切兩邊實中央空者名曰芤瞤如倫切動也可下證曈徒東切曈曈日欲明貌晡布胡切申時也妄撮土活切三指取也栗力質切懼也黨底朗切瘀於豫切積血也駛山吏切疾也不可下證倦居員切結胸證痓充至切惡也痓濕暍證齘音械齒相切也濕證噦於月切逆氣也掣尺折切牽也雜病證甘爛水即肝切熟也不擊則生擊之則熟水之味本鹹擊熟之則歸土性矣然土之味本甘故也崖暴之水擊之而成沫乾而成土水歸土性故謂之甘爛水淀徒練切淺水也水淺則近土甘與甘爛之甘同傷寒勞復證頮呼內切滌面也豭古瑕切牡豕也謂之豭鼠矢者得非牡鼠乎纂先管切器也暑病表證暍於歇切中熱也溫也五種暑病胻痠上户當切說文云脛專也下光九切疼痠員淡上胡拳切下逹濫切辟溫疫論蠆丑介切螫蟲掠力酌切青筋牽證牽輕烟切引前也青東方之色筋主肝肝屬木謂之牽有筋牽相連之意赤脈㩌證㩌芳未切擊化也赤南方之色脈主心心屬火火性炎上故好爭㩌者相擊化也故有相爭之意黃隨肉證隨旬為切黃者中央之色肉屬脾脾屬土土無正形從在四季正王在長夏謂之隨者有若從木火金水之意火生土故黃肉隨所次列之於赤脈㩌之後顳仁涉切在耳前曰顳顬仁乎切顬顬耳前動輸式朱切白氣貍證貍陵之切白西方之色氣主肺肺屬金貍善捕物而有殺心亦若金類黑骨溫證溫烏溫切黑北方之色骨生腎腎屬水謂之溫者亦自水而已故溫居末以總其名焉溫􅎪方證啘之月切黃病方證疸丁寒切火疸也臚力居切敗壞别行瞪真耕切怒目直視瞬式閏切目動也莊子曰終日視而目不瞬膕弋陵切曲略也小兒傷寒呀呷上虛牙切唅呀張目貌下呼甲切說文云吸呷也傷寒暑病通用刺法諴胡讒切和也熱病死生候瘈瘲上胡計切下子用切傷寒論音訓

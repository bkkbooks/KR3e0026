body:
  text: 傷寒總病論卷六宋龎安時撰傷寒雜方冬夏傷寒發汗極效時雨散冬春及夏初行之大驗蒼术四兩甘草麻黃各二兩猪牙皂角四挺為末每服二錢水一盞煎三兩沸和滓溫服蓋覆取汗出立效但是時行寒疫皆宜服此可多合以拯貧民傷寒頭痛𤣥精石方石膏太隂𤣥精石各一兩麻黃二兩甘草半兩粗末每服四錢水一盞竹葉二七片煎七分去滓溫飲不計時候傷寒頭痛不止瓜蒂牙硝散藜蘆一錢瓜蒂三錢牙硝二錢腦麝各少許細末吹少許入鼻得嚏則愈時氣八九日喘悶煩躁麻黃杏子湯桔梗麥門冬各一兩麻黃一兩半杏仁黃芩甘草各三分粗末每五錢水一盞半煎八分溫溫日可四五服時氣腦熱頭疼不止朴硝散川朴硝研生油調塗頂上時氣豌豆瘡出不快心神煩悶犀角五香湯犀角屑丁香乳香木香各半兩𤣥參升麻各一兩麝香一分木香不用粗末每五錢水一盞竹瀝半盞煎八分溫溫日三四服妊娠雜方妊娠時氣令子不落伏龍肝散伏龍肝為末水調塗臍下乾時易之疾差乃止妊娠傷寒內熱極甚令不傷胎含雞子法取雞子以絹袋貯投井底浸令極冷旋破吞六七枚佳妊娠傷寒腹脹大便不通喘急牽牛散大黃鬱金青橘皮各一兩甘草三分牽牛子取末二兩細末不計時薑湯調下二錢以利為度妊娠傷寒服汗下諸藥熱已退覺氣虛不和宜與此藥安胎黃蓍人參湯黃蓍人參半夏陳橘皮麥門冬當歸赤茯苓各半兩粗末每服四錢水二盞薑三片煎七分去滓下阿膠末一小匕煬化溫與之日可三四服大熱甚胎不安者不宜前藥宜用阿膠散阿膠末一錢半竹瀝調下無竹瀝用小麥竹葉煎湯調下妊娠傷寒四五日已上心腹脹渴不止腰痛重橘皮枳實湯枳實麥門冬各三分陳橘皮一兩粗末每服五錢水一盞半生薑四片煎八分去滓溫服妊娠熱病胎死腹中鹿角屑湯鹿角屑一兩水一碗蔥白五莖䜴半合煎六分去滓溫作二服又方益母草飲子益母草絞汁飲半升即出治傷寒小産惡路不行腹脹煩悶欲死大黃桃仁湯朴消大黃二味等分末之每一錢或二錢桃仁去雙仁皮尖碎之濃煎湯調下以通為度日三服小産後其惡路被熱蒸斷不行地黃飲子地黃汁藕汁各一碗生薑汁一盞令和暖溫分三四服微有寒煎二十沸服之亦下死胎傷寒産後血暈欲絶紅花散紅花荷葉薑黃等分末之炒生薑小便調下二錢凡傷寒小産夏月宜少用醋炭多有煩悶暈死者傷寒産後惡血衝心悶亂口乾生地小便飲子生地黃汁藕汁小便各一盞和勻煎三兩沸溫熱分作三服傷寒産後惡露為熱摶不下煩悶脹喘狂言者抵黨湯及桃仁承氣湯主之二方在可下門中傷寒小産後煩悶大躁渴石膏湯黃連黃芩甘草栝樓根各一兩石膏一兩半粗末每服四錢水一盞半煎八分溫服一盞傷寒暑病通用刺法龎曰凡過經不解讝語者當刺期門隨其實而瀉之刺期門之法須待脈弦或浮緊刺之必愈餘刺之不差以正取肝之邪故也期門穴直乳下當腹傍近脅骨是穴針入一寸傷寒發熱嗇嗇惡寒其人大渴飲水者其腹必滿小便不利而自汗出其病欲解此為肝乘肺名曰縱當刺期門腹滿譫語寸口脈浮而緊此為肝乘脾名曰橫當刺期門下血而讝語此為熱入血室但額上汗出者當刺期門隨其實而瀉之濈然汗出者愈婦人中風發熱惡寒其經水適來得七八日熱除脈遲身凉胸脅下滿如結胸狀而讝語此為熱入血室當刺期門隨其實者而取之太陽與少陽併病頭痛或眩時如結胸心下必堅當刺瀉肺腧大杼慎不可發汗發汗則讝語讝語則脈弦五日讝語不止當刺期門傷寒喉痺刺手少隂腕骨小指後動脈是也刺入三分補之佳通里二穴去腕後一寸是手少隂之經主熱病喉痺針入三分可炙三壯傷寒妊娠腹滿不得小便腰以下腫如水氣狀懷孕七月太隂當養此心氣實當刺瀉勞宫及關元小便利即愈勞宫手掌中夫屈名指取之關元在臍下三寸傷寒飲水過多腹脹氣喘刺中脘鳩尾下三寸傷寒汗不出瘠强喉閉煩滿針大杼大杼穴在第一椎下兩傍相去各一寸五分針入一寸㵼之傷寒餘熱不盡皮膚乾燥針曲池在曲肘橫紋頭針可透下㵼之熱病汗出脈反順可汗者取之魚際太淵太都太白㵼之則熱去補之則汗出太甚者取踝上橫紋以止之魚際在大指本節後內側散脈中太淵在掌後陷中太都在足大指本節後陷中太白在足內側於骨下陷中踝上橫紋不說穴名當是足內踝上二寸名曰腹溜主骨寒熱汗注不休故也熱病七八日脈口動喘而眩者急刺之汗且自出淺刺手大指間合谷穴是也熱病先胸脅痛手足躁刺足少陽補足太隂據傷寒皆忌土敗木賊證是足少陽木受邪當傳尅脾土故宜瀉足少陽之邱墟而補足太隂之太白素問云補足太隂者是也其全元起太素作手太隂而以肺經從肺出腋下故胸脅痛滿又有引虛則索筋於脈不得索之於金而以手太隂為是既言不得索之於金矣而復求金乎是必不然也既㵼於木理不合更補於金若補於金則木反受尅矣故當補脾土無疑熱病先手臂痛刺手陽明太隂汗出止太隂絡列缺穴在腕上二寸半刺七分陽明商湯穴在手大指次指端去甲如薤葉刺三分熱病始於頭首者刺項太陽而汗出止天柱穴在項後髮際大筋外廉陷中可刺五分㵼之熱病先眩冒而熱胸脅滿刺足少隂少陽足少隂涌泉穴在兩腳心陷屈足卷指宛宛中刺入七分㵼之無令血出足少陽俠溪穴在小指岐骨間本節前陷中熱病始足脛痛者先取足陽明而汗出陷谷穴在足大指次指之間本節後陷中針入五分㵼之熱病三日汗不出怵惕胸脅痛不可轉側大小便血及衄不止氣逆嘔􅎪煩渴食飲不下針勞宫在手掌心針入五分㵼之傷寒死生候傷寒下利厥逆煩躁不得卧者死傷寒厥逆六七日發熱而利者生汗出利不止者死但有隂無陽故也傷寒咳逆上氣其脈散者死謂形損故也夫病者實則讝語虛則鄭聲重語是也直視讝語喘滿者死下利者亦死傷寒脈隂陽俱緊口中氣出唇口乾燥倦卧足冷鼻中涕出舌上胎滑勿妄治也傷寒脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也又未知何藏先受其災若汗出髮潤喘而不休此為肺先絶也陽反獨留形體如烟熏直視搖頭此為心先絶也唇吻反青四肢漐習者此為肝先絶也環口䵩黑柔汗發黃此為脾先絶也溲便遺失狂言目反直視者此為腎先絶也傷寒脈順四時夜半得病日中解日中得病夜半解更不傳也熱病死生候熱病隂陽交者熱煩身燥太隂寸口脈兩衝尚燥盛是隂陽交死得脈靜者生熱病得汗身冷脈欲絶其人已安靜但昏沈喜睡急與四逆輩令手足溫不爾熟寐而絶熱病陽進隂退頭獨汗出死隂進陽退腰以下至足有汗出亦死隂陽俱進汗出已熱如故亦死隂陽俱退汗出已寒慓不止口鼻氣冷亦死熱病所謂併隂者熱病已得汗因得泄是謂併隂故治熱病所謂併陽者熱病已得汗脈尚躁盛大熱汗出雖不汗身和而衄是謂併陽故治熱病不知痛所在不能自收口乾渴熱甚隂頭有寒者熱在骨髓死不治病若讝語妄言身當有熱而反四逆脈沈細者死熱病在腎令人渴口乾舌焦黃赤晝夜引飲不止腹大而脹尚不厭飲目無精光死不治熱病所謂陽附隂者腰以下至足熱腰以上寒隂氣下爭而還心腹滿者死熱病所謂隂附陽者腰以上至頭熱腰以下寒陽氣上爭而還得汗者死熱病得汗脈减躁身和而赤此為榮未交待時自己肝病待甲乙之例熱病七八日脈微小病者溲血口中乾一日半死代脈一日死熱病七八日脈不躁不數而喘後三日有汗三日不汗四日死未曽汗勿庸刺熱病身面發黃面腫心熱口乾舌卷焦黃黑身麻而臭伏毒傷肺中脾者死熱病瘈瘲狂言不得汗瘈瘲不止伏毒傷肝中膽者死熱病汗不出出不至足嘔膽吐血善驚不得卧伏毒在膽足少陽者死溫病死生候有病溫汗出徹復熱而脈躁疾不為汗衰狂言不能食病名曰隂陽交見三死而未見一生寅申己亥辰戌丑未年有此證溫病得病便短息微悶神識惺惺脈尺寸反者死子午卯酉年有此證凡溫病人三二日身熱脈疾頭痛食飲如故脈直疾八日死四五日頭痛脈疾喜吐脈來細十二日死此病不療八九日脈不疾身不痛目不赤色不變而反利脈來牒牒按不彈手指時時大心下硬十七日死心下不硬者生天行差後禁忌飲酒合隂陽復病必死生鱠煮麵酒韭菌鱓蓴豆粉犬羊肉腸血生果油肥之類食之皆發熱黃下利不救諸勞動皆致復尚可治女勞多死解仲景脈說龎曰動脈見於關上下無頭尾厥厥動搖名曰動也陽動則汗出隂動則發熱關位占六分前三分為陽後三分為隂若當陽連寸動而隂靜法當有汗而解素問云陽加於隂謂之汗當隂連尺動而陽靜則發熱素問云尺粗為熱中若大汗後形冷惡寒者三焦傷也此是死證脈按之虛軟戰汗而解脈按之有力躁汗而解脈虛微必經汗吐下無津液作汗隂陽自衝愈衝陽在足大指次指間上行五寸是足陽明胃脈也名曰衝陽穴也少隂脈在足內踝後跟骨上動脈陷中是足少隂腎脈也名大絡穴仲景云按寸不及尺握手不及足謂醫者只慿尺寸不診衝陽太溪也龐曰寸口脈浮大浮為虛醫反下之為責虛取一實大為無血反飲冷水令汗大出為守空迫血致跌陽脈亦浮虛虛寒相摶則噎也若跌陽脈不浮而但滑者則胃寒而􅎪矣龐曰伏氣之病謂非時有暴寒而中人伏毒氣於少隂經始雖不病旬月乃發便脈微弱法先喉痛似傷吹則下利喉痛半夏桂枝甘草湯主之下利有諸證用通氣四逆湯主之方在少隂證中此病三二日便差古方謂腎傷寒是也半夏桂枝甘草生薑各一兩㕮咀以水三升煮一升每一盞細呷之龐曰君子春夏養陽秋冬養隂順天地之剛柔也謂時當溫必將理以凉時當暑必將理以冷凉冷合宜不可太過故能扶隂氣以養陽氣也時當凉必將理以溫時當寒必將理以熱溫熱合宜不可太過故能扶陽氣以養隂氣也隂陽相養則人氣和平有人好攝生者盛暑亦復衣避風飲食必熱而成發黃脫血者多矣盛寒之時云井暖當服以凉藥而成吐利腹痛者多矣此皆慿庸人妄傳以為實理往往橫夭而尚不覺知深可傷也此是平人將理之法其有風熱痼冷者須當順其性爾解華他內外實說魏志華他傳有府吏兒尋李延共止俱頭痛身熱所苦正同他曰尋當下之延當發汗或難其異他曰尋外實延內實故治之宜殊即各與藥明旦並起某深疑陳夀誤用內外字非華他本意也病者頸痛身熱惡寒為隂邪外實法當發汗病者頭疼身熱但蒸蒸發熱不惡寒為陽邪內實也法當下之所謂外實者外為陽為表也陽氣為寒所折爭於表間陽衰而隂勝故發熱復有惡寒之證可以汗而發之以復陽氣也所謂內實者內為隂為裏也極隂變陽寒甚生熱陽氣反勝而入裏故胃府內實蒸蒸作熱不惡寒可以泄利以復隂氣言實者非正實乃邪實也素問云邪氣盛則實所以知他傳內外二字差謬矣辨論近世常行煮散古方湯液存而不用蓋古方升兩大多或水少湯濁藥味至厚殊不知聖人專攻一病决一兩劑以取驗其水少者自是傳寫有舛非古人本意也唐自安史之亂藩鎮跋扈至於五代天下兵戈道路艱難四方草石鮮有交通故醫家省約以湯為煮散至有未能中病疑混而數更方法者多矣沿習至今未曽革弊古方湯液實於今世為無用之書唐徐氏大和濟要方减其升兩雖則從俗患其太省故病未半而湯劑已竭鄙心患之自顧抄撮斟酌積三十餘年稍習其事故為裁减升兩庶從俗而便於行用或一方而取半劑或三分取一或四分取一或五分取一或增其水有可以作煮散者有病勢重專用湯攻者或云古升稱省三升准今之一升三兩准今之一兩斯又不然且晉葛氏云附子一枚准半兩又云以盞當升以分當兩是古之升稱與今相同許人减用爾今之為醫者多是愚俗苟且衣食貪其貨賄大方廣論何以該通唯密窖鄙淺方技使人不窺其隙以自矜大乘便為神工致逺恐泥其夭枉固已多矣鮮有多聞博識者雖時有之士大夫咸鄙其為術自非不顧流俗以拯濟為心則不能留神焉今解釋前言詳正脫誤擇其篤論刪其繁方仍增入新意不敢穿鑿冀新學易見覽斯文已得其七八矣此方皆古聖賢撰用其效如神更不一一具姓名載其所出其間自有所見經手得驗者共緝成卷在識者覽而知焉上蘇子瞻端明辨傷寒論書安時所撰傷寒解實用心三十餘年廣尋諸家反覆參合决其可行者始敢編次從來評脈辨證處對湯液頗知實效不敢輕易謬妄誤人性命四種溫病敗壞之候自王叔和後鮮有明然詳辨者故醫家一例作傷寒行汗下傷寒有金木水火四種有可汗可下之理感異氣復變四種溫病溫病若作傷寒行汗下必死傷寒汗下尚或錯謬又沈昧於溫病乎天下枉死者過半信不虛矣國家考正醫書無不詳備惟此異氣敗壞之證未暇廣其治法安時所以區區略意欲使家家户户閲方易為行用自可隨證調治脈息自然詳明不假謁庸粗甘就橫夭者也設有問孫真人云今時日月短促藥力輕虛人多巧詐感病厚重用藥即多又云加意重復用藥乃有力自孫真人至今相去逾逺藥反太輕省何也安時妄意唐遭安史之亂藩鎮跋扈逮至五代四方藥石鮮有交通故醫家少用湯液多行煮散又近世之人嗜欲益深天行災多用藥極費日月愈促地脈愈薄産藥至少何以知之安時常於民家見其逺祖所録方册上記昔事跡其間有廣順年巴豆每兩千二足故以知藥石不交通也且溫疫之病周官不載班瘡豌豆始自魏晉腳氣肇於晋末故以知年代近季天災愈多用藥極費也礬石曽青之類古人治衆病痼瘕大要之藥今王公大人家尚或闕用民間可知矣人參當皇祐年每兩千四五白术自來每兩十數文今增至四五百所出州土不絶如帶民家苗種以獲厚利足以知地脈愈薄産藥至少矣湯液之制遭值天下禍亂之久地脈薄産之時天災衆多之世安得不吝惜而為煮散乎故今世上工治病比之古人及中工者幸矣設有問今之升稱與古不同其要以古之三升准今之一升古之三兩准今之一兩雖然如此民間未嘗依此法而用古方者不能自解裁减又如附子一枚凖半兩是用一錢三字為一枚使人疑混如何得從俗乎安時言唐太和年徐氏撰濟要方其引云稱兩與前代不同升合與當時稍異近者重新纂集約舊刪修不惟加减得中實亦分兩不廣又云今所刪定六十三篇六百六首勒成六卷於所在郡邑標建碑牌明録諸方以備衆要又云時逢聖厯年屬大和便以大和濟要方為名備録如左已具奏過准敕頒行此方已遭兵火湮滅安時家收得唐人以朱墨書者紙籍腐爛首尾不完難辨徐氏官與名即不知本朝崇文諸庫有此本否安時謂裁减古方宜依徐氏以合今之升稱庶通俗用但增其藥之枚粒耳是以仲景諸古方次第復許减半芍藥湯中載之詳矣陶隱居云古今人體大小或異藏府血氣亦有差焉請以意酌量藥品分兩古引以明取所服多少配之或一分為兩或二銖為兩以盞當升可也若二分星較合如古方承氣湯水少藥多何以裁之所以聖惠方煮散盡是古湯液豈一一計較多少治病皆有據驗在調習多者乃敢自斟酌耳設有問暑熱重於溫病者宜行重復方却多行煮散者何安時謂夏月多自汗腠理易開經云天暑地熱經水沸溢故用煮散或有病勢重者即於湯證之下注云不可作煮散也如此之類者頗多聊引梗概俗云耕當問奴織當訪婢士大夫雖好此道未必深造宫妬朝嫉者衆吹毛求瑕安不爍金更望省察狂瞽之言干浼台聽悚息無地某再拜傷寒總病論卷六

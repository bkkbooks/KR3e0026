body:
  text: 傷寒總病論卷五宋龎安時撰天行溫病論龎曰辛苦之人春夏多溫熱者皆由冬時觸冒寒毒所致自春及夏至前為溫病者素問仲景所謂傷寒也有冬時傷非節之暖名曰冬溫之毒與傷寒大異即時發病溫者乃天行之病耳其冬月溫暖之時人感乖候之氣未即發病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒乃發則肌肉斑爛也又四時自受乖氣而成腑臟隂陽溫毒者則春有青筋牽夏有赤脈㩌秋有白氣貍冬有黑骨溫四季有黃肉隨治亦别有法難經載五種傷寒言溫病之脈行在胃經不知何經之動隨經所在而取之中風木傷寒金熱病火濕溫水溫病土治之者各取其所屬據難經溫病本是四種傷寒感異氣而變成溫病也土無正形因火而名故以溫次熱也土寄在四維故附金木水火而變病所以王叔和云陽脈浮滑隂脈濡弱更遇於風熱變成風溫陽脈洪數隂脈實大更遇其熱變成溫毒溫毒為病最重也陽脈濡弱隂脈弦緊更遇濕氣變為濕溫脈隂陽俱盛重感於寒變成溫瘧斯乃同病異名同脈異經者也故風溫取足厥隂木手少隂火溫毒專取手少隂火溫瘧取手太隂金濕溫取足少隂水手少隂火故云隨經所在而取之也天行之病大則流毒天下次則一方次則一鄉次則偏著一家悉由氣運鬱發有勝有伏遷正退位或有先後天地九室相形故令升之不前降之不下則天地不交萬化不安必偏有宫分受斯害氣莊子所謂運動之泄者也且人命有遭逢時有否泰故能偏著一家天地有斯害氣還以天地所生之物以防僃之命曰賢人知方矣辟溫疫論療疫氣令人不相染及辟溫病傷寒屠蘇酒通俗文曰屋平曰屠蘇廣雅云屠蘇庵也然屠蘇平而庵園所以不相同今人寒月廳事下作版閣是也尊貴之家閣中施羽帳綿幃聚會以禦寒故正旦會飲辟溫酒而以屠蘇為名也大黃桂枝桔梗川椒各十五銖白术十銖烏頭菝葜防風各六銖㕮咀縫囊盛以十二月晦日蚤懸沈井中至泥正旦平曉出藥置酒中屠蘇之東向户飲之屠蘇之飲先從小起多少自在一人飲一家無病一家飲一里無恙飲藥酒三朝還置井中若能歲歲飲可代代無病當家內外井皆悉著藥辟溫氣也忌豬肉生蔥桃李雀肉等辟溫粉芎术白芷藁本苓陵香等分為末每一兩半入英粉四兩和勻常撲身上無英粉蚌粉亦可凡出汗大多欲止汗宜此法入溫家令不相染研雄黃并嚏法水研光明雄黃以筆濃蘸塗鼻竅巾則疫氣不能入與病人同牀亦不相染五更初洗面後及臨時點之凡溫疫之家自生臭穢之氣人聞其氣即時以紙筯探鼻中嚏之為佳不爾邪氣入上元宫遂散百脈而成斯病也以雄黃點之則自不聞其氣并辟諸惡怪夢神良常以雞鳴時存心念四海神名三七遍辟百邪惡鬼令人不病溫東海神阿明南海神祝融西海神巨乘北海神禺強每入病人室存心念三遍口勿誦古今名賢傅許季山所撰干敷散辟溫疫惡疾不相染著附子一個一分者細辛乾薑麻子柏實各一分細末和入柏實麻子令勻酒服方寸匕服藥一日十年不病二日二十年不病三日三十年不病受師法保應三日服闕歲名疫則預服之不飲酒井花水服亦得忌豬肉生菜辟溫殺鬼丸薰百鬼惡氣雄黃雌黃各二兩羖羊角虎頭骨各七兩龍骨鱉甲陵鯉甲螺皮各三兩樗雞十五枚無以芫青五枚代空青一兩無以石緑代川芎真朱砂各五兩東門上雞頭一枚細末以臘二十兩併丸雞頭大正旦門前燒一丸男左女右臂上帶一丸辟百惡獨弔喪問死吞下一丸小豆大天隂大霧燒一丸於門牖前極佳務成子螢火丸主辟疾病惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害者冠軍將軍武威大守劉子南從尹公受得此方永平十二年於虜界交戰敗績士卒掠盡子南被圍矢如雨未至子南馬數尺矢輒墮地虜以為神人各解圍而去子南以方教子及諸兄弟為將者皆未嘗被傷纍世祕之漢末青牛道士得之以傳安定皇甫隆隆傳魏武帝乃有人得之故一名冠軍丸一名武威丸曾試此法一家五十餘口俱染病唯四人帶者不染螢火鬼箭削取皮羽蒺藜各一兩雄黃雌黃礬石各二兩羖羊角煆竈灰鐵錘柄入鐵處燒焦各一兩半為末以雞子黃丹雄雞冠一具和之如杏子大作三角絳囊盛住丸帶左臂若從軍繫腰下勿離身若在家挂户之上辟絶賊盜溫疫神良劉根别傳曰潁川太守到官民大疫掾吏死者過半夫人郎君悉病府君從根求消除疫氣之術根曰寅歲泄氣在亥今年太歲在寅於聽事之亥地穿地深三尺廣與深同取沙三斛著中以淳酒三升沃其上府君從之病者即愈疫氣遂絶於聽事取太歲六合之地也青筋牽證春三月青筋牽證其源自少隂少陽從少隂而涉足少陽少陽之氣始發少隂之氣始衰隂陽怫鬱於腠裏皮毛之間因生表裏之痾因從足少陽發動及少隂則藏腑受癘而生其病肝腑臟隂陽毒氣病頸背雙筋牽急先寒後熱其病相反若腑虛為隂邪所傷者則腰強急腳縮不伸腑中欲折眼中生花此法主之不可作煮散柴胡地黃湯柴胡二兩半生地黃五合半香豉五合生薑石膏各四兩桂枝半兩大青白术芒硝梔子仁各一兩半㕮咀水七升煎三升去滓下芒硝溫飲一盞日三四服未差再作肝腑臟隂陽溫毒病頸背牽急先寒後熱其病相反若臟實則為陽毒所損眼黃頸背強直若欲轉動即合自回側石膏竹葉湯不可作煮散淡竹葉二升梔子仁黃芩升麻芒硝各一兩半細辛玄參各半兩石膏四兩車前草一升葉㕮咀水六升先下竹葉車前草煮四升去滓下諸藥煮二升去滓下芒硝化勻溫飲一盞赤脈㩌證夏三月行赤脈㩌病其源自少隂太陽心腑臟隂陽溫毒氣身熱皮肉痛起其病相反若臟實則為陽毒所侵口乾舌破而咽塞若腑虛則為隂邪所傷戰掉不定而驚動石膏地黃湯不可作煮散石膏生葛根各四兩麻黃二兩玄參三兩知母半兩梔子仁大青黃芩芒硝各一兩半濕地黃半升㕮咀水九升取四升去滓下芒硝煬化勻溫飲一盞日三四服黃肉隨證四季月終餘十八日行黃肉隨病其源從太隂陽明相格節氣相移三焦寒濕不調四時開格而起則臟腑之痾隨時而受癘陽氣外泄隂氣內伏脾腑臟溫毒病隂陽毒氣頭重項直皮肉強其病相反臟實則陽疫所傷藴而結核起於頸下布熱毒於分肉之中上散入髮際下貫顳顬隱隱而熱不相斷離玄參寒水石湯不可作煮散羚羊角屑大青各一兩升麻射干芒硝各一兩半玄參四兩寒水石二兩半梔子仁二兩㕮咀水七升煎至三升去滓下芒硝煬化勻溫飲一盞日三四服扁鵲云灸肝脾二腧主治四時隨病白氣貍證秋三月行白氣貍病其源從太陽繫手太隂太隂受淫邪之氣則經絡壅滯毛皮堅竪發泄邪氣則藏腑傷溫隨狀受癘肺腑臟溫病隂陽毒氣其病相反若腑虛則隂邪所傷乍寒乍熱損肺傷氣暴嗽嘔逆石膏杏仁湯不可作煮散石膏四兩杏仁前胡各二兩甘草一兩梔子仁麻黃紫苑桂枝大青玄參葛根各一兩半㕮咀水九升煎四升溫飲一盞日三四服肺腑臟溫病隂陽毒氣其病相反若臟實則為陽毒所損體熱生斑氣喘引飲石膏蔥白湯不可作煮散豉半升蔥白連鬚二兩石膏生薑各四兩梔子仁升麻大青芒硝各一兩半㕮咀水八升煎三升半去滓下芒硝煬化勻溫飲一盞日三四服黑骨溫證冬三月行黑骨溫病其源從太陽少隂相摶藴積三焦上下壅塞隂毒內行臟腑受客邪之氣則病生矣腎府藏溫病隂陽毒氣其病相反若腑虛則為隂毒所傷裏熱外寒意欲守火而引飲或腰痛欲折腎府藏溫病隂陽毒氣其病相反若藏實陽毒所損胸脅切痛類如刀刺心腹膨脹服冷藥差過而便洞泄苦參石膏湯不可作煮散苦參生葛各二兩石膏濕地黃各四兩梔子仁茵蔯芒硝各一兩半香豉蔥白各半升㕮咀水八升煎三升半去滓下芒硝煬化勻溫飲一盞日三四服扁鵲云灸脾肝腎三腧治丹毒黑骨溫之病知母解肌湯療溫熱病頭痛骨肉煩疼口燥心悶或是夏月天行毒外寒內熱者或已下之餘熱未盡者或熱病自得利有虛熱煩渴者麻黃甘草各一兩知母葛根各一兩半石膏三兩㕮咀水三升煎一升去滓溫飲一盞若已下及自得利下虛熱未除者除麻黃加葛根成三兩病常自汗者亦如此法加葛根無汗而難得汗者加麻黃成一兩半因變泄者除麻黃加白薇人參各一兩加水四升煎至一升半溫病噦方論伏熱在胃令人胸滿氣逆逆則噦若大下後胃中虛冷亦致噦也溫病有熱飲水暴冷啘茅根葛根湯茅根葛根各半升水四升煮二升去滓溫飲一盞溫病熱未除重被暴寒寒毒入胃藴結不散變啘梓皮飲子單煮梓皮汁稍稍飲之佳溫病積飲冷冷結胃中熱入腎中變壯熱大啘者服梓皮湯夫腎中有熱者病差後足心皮喜剝脫去頭髮秃落是其證也溫病胃冷變啘茅根橘皮湯白茅根半升橘皮一兩半桂枝葛根各一兩㕮咀水三升煎去半去滓溫飲一盞啘止停後服微有熱減桂半兩微有熱宜去桂加生薑二兩溫病有熱飲水暴冷啘枇杷茅根湯枇杷葉茅根各半斤水四升煮去半去滓稍熱飲之一二盞已上四方皆不可作煮散溫病者此熱入腎腎藏惡燥熱盛則腎燥腎燥故渴引飲而自救也萎蕤湯療冬溫及春月中風傷寒發熱頭眩痛咽乾舌強胸中痛心胸痞滿腰背強萎蕤白薇麻黃獨活大杏仁生芎藭甘草青木香葛根各一兩石膏一兩半㕮咀水五升煎二升半去滓飲一盞通口服之取汗若一寒一熱者加朴硝半兩大黃一兩半朴硝末後下黃病證黃病者一身盡痛發熱面色洞黃七八日後結熱裏有血當下之如豚肝狀有血必狂宜抵黨湯如黃病自下血亦有自愈者其人小腹滿急若眼睛澀痛鼻骨疼兩膞及項強腰背急則是黃候大便澀但得小便利則不慮死矣不用大便多多則心腹脹為不佳此由寒濕在表則熱畜於脾胃腠理不開瘀熱與宿榖相摶鬱蒸不得消散則大小便不通故身體面目皆變黃色黃候其寸口近掌無脈口鼻氣冷者死亂髮兩雞子大豬膋八兩二味煎令髮消盡研絞去滓分二服病從小便去有人再病胃中乾糞下便差又方瓜蒂二十七個水一升煎去半頓服之黃疸目黃不除瓜丁散瓜丁細末含水搐豆許深入鼻中黃水出盡為度孫真人曰凡遇天行熱病多內熱著黃但用瓜丁散內鼻中黃水出乃愈即於後不復患病黃矣常須用心警候病人四肢身面微似有黃氣即速行瓜丁散不可令散漫失候必至危矣特忌酒麵色欲犯者死黃家日晡發熱而反惡寒此為女勞得之膀胱急小腹滿身體盡黃額上反黑足下熱因作黑疸大便必黑腹臚脹滿如水狀大便黑溏者此女勞之病非水也腹滿者難療硝石礬石散硝石礬石等分搗篩以大麥粥汁和服方寸匕日三重衣覆取汗病隨大小便去小便正黃大便正黑也大麥則須是無皮麥者千金方云硝石二分熬令燥礬石一分熬令燥故治之傷寒感異氣成溫病壞候并瘧證病人素傷於風因復傷於熱風熱相摶則發風溫四肢不收頭痛身熱常自汗出不解治在少隂厥隂少隂火厥隂木不可發汗汗出則讝語內煩擾不得卧善驚目光無精治之復發其汗如此者醫殺之耳風溫之為病脈隂陽俱浮汗出體重其息必喘默默但欲眠下之則小便難發汗則讝語加溫針則耳聾難言但吐下之則遺尿宜萎蕤湯方在溫病噦方論中因發汗後身體不惡寒而反惡熱無下證者名曰風溫知母石膏湯知母一兩石膏一兩半葛根萎蕤各三分甘草黃芩升麻人參杏仁羌活防風各半兩㕮咀水三升煎一升半去滓溫飲一盞通口與之取汗病人素傷於寒因復傷於寒變成溫瘧寒多熱少者華他赤散主之在寒疫治法中寒熱相半者丹砂丸兼治間日瘧子丹砂人參各一錢附子一個半兩者細末蜜丸梧桐子大煎竹葉湯吞下二三十丸發前三服中病則吐或身習習麻木未中病加至四十丸間日發前如法服中病即止溫瘧內熱甚昏昏默默者麥奴丸主之方在可汗門中溫瘧其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯石膏四兩知母一兩半甘草半兩粳米一合半桂枝三分㕮咀水三升半煮米熟去米下藥取一升半溫飲一盞溫瘧之為病先熱後寒病人嘗傷於濕因而中暍濕熱相摶則發濕溫病苦兩脛逆冷腹滿支胸頭目痛苦妄言治在少隂不可發汗汗出則不能言耳聾不知痛所在身青面色變名曰重暍如此者醫殺之耳治濕溫如前證者白虎湯主之方在傷寒厥隂門中濕溫多汗妄言煩渴石膏甘草散石膏甘草等分細末漿水調下二錢匕日三服龎曰愚醫昧於冷熱之脈見足脛冷多行四逆輩如此醫殺者不可勝計濕溫脈小緊有如傷寒脈但證候有異數進白虎則脛自溫而差也病人素傷於熱因復傷於熱變為溫毒重溫毒為病最重也風溫與中風脈同溫瘧與傷寒脈同濕溫與中濕脈同溫毒與熱病脈同唯證候異而用藥有殊耳議作傷寒發汗者十死無一生敗壞别行方天行病經七日已上熱勢彌固大便祕澀心腹痞滿食飲不下精神昏亂恍惚狂言異語其脈沈細衆狀之中無一可救決計附子鱉甲湯不可作煮散鱉甲白蘚皮茵蔯各半兩細辛桂枝白术吳茱茰附子枳實各一分大黃三分生薑一兩㕮咀水三升煮一升溫作三服傷寒將理失節服冷藥太多伏熱在藏手足厥逆瓜甲稍青恐陽氣漸衰成隂毒氣踟蹰之間變入狐惑面色斑斑如錦紋木通桂枝湯木通桂各一兩吳茱茰細辛各一分甘草半兩蔥白六莖棗九個㕮咀水二升半煎一升二合去滓溫作四服傷寒三七日至四七日勞痟不歇熱毒不止乍熱乍寒乍差乍發動作如瘧鱉甲恆山湯鱉甲恆山牛膝各三分大青牡丹各半兩石膏二兩烏梅肉甘草各一分淡竹葉豉生麥門冬生地黃各二合半㕮咀水五升煎二升半溫飲一盞傷寒八九日不差名曰敗傷寒諸藥不能治者鱉甲犀角湯鱉甲升麻柴胡烏梅肉枳實犀角屑黃芩各半兩甘草一分生地黃二合半㕮咀水三升煎一升半分五服日三夜二敗傷寒頭痛骨肉痛荒言妄語醫所不能療者用前黑奴丸主之方在雜汗證中龎曰有人患時氣經六七日因發狂遂眼瞪不瞬手攣膕曲口噤或有張口者冥冥不知人事口鼻氣絶但心頭溫面色和六脈皆動一如尸厥如此不省五六日因作成敗計救用風引湯加附子嚾下兩服遂省風引加附子湯寒水石石膏赤石脂白石脂紫石英滑石各六錢附子一個龍骨大黃乾薑各四錢甘草牡蠣粉各二錢桂枝三錢粗末每服三錢匕水一盞煎至七分去滓溫飲之小兒傷寒證小兒傷寒發熱自汗多啼葛根芍藥湯葛根三分芍藥甘草黃芩桂枝各半兩粗末每服三錢水一盞煎六分去滓溫溫作二服相次與之熱盛者去桂加升麻半兩無汗者加麻黃一兩喘者加杏子半兩龎曰小兒傷寒始因壯熱不除被湯丸下後其項強眼翻弄舌搐搦如發癎狀久則哽氣啼聲不出醫以為驚風屢服朱砂水銀牛黃録粉巴豆竹􅅹之類藥皆無驗此由誤下後毒氣結在心胸內熱生涎涎裹諸藥不能宣行所致也蕩涎散粉霜一錢膩粉二匣芫花一分細末暖漿水調下一歲半錢病勢大者再服白色著底者粉霜也宜盡嚾之良久得睡取下黑黃涎裹包丹砂之類皆成顆塊啼聲便出立安龎曰小兒結胸亦如前狀但啼聲出醫亦多作驚風治之其脈浮滑試以指按心下則痛而啼宜半夏黃連括蔞湯斟酌服當下黃涎便差小兒傷寒蒸起風熱發癎手足搐掣不省蛇皮湯麻黃大黃牡蠣黃芩各四錢寒水石白石脂赤石脂石膏紫石英滑石各八錢人參桂枝龍齒各二錢甘草三錢蛇退皮一錢粗末每四錢水一盞半煎七分溫分二服熱多者進三服以水并竹瀝中半煎尤佳小兒傷寒後胃中有熱煩悶不食至日晚潮熱頰赤躁亂嘔吐蘆根湯生蘆根生茅根赤茯苓子芩麥門冬甘草生薑各一分小麥糯米各二百粒細銼水一升二合煎六合去滓分三服立效小兒傷寒咳嗽胸膈痰壅喉中呀呷聲射干湯射干麻黃紫苑桂心半夏各半兩甘草一分粗末每服三錢水一盞半生薑汁少許煎六分去滓入蜜半匕煬化勻溫作二服又方甜葶􅏣湯甜葶􅏣炒杏仁炒麻黃各等分粗末每二錢水一盞煎五分溫溫分減服小兒傷寒後盜汗體熱咽乾犀角黃耆湯犀角屑茯神麥門冬黃耆人參各半兩甘草一分粗末每三錢水一盞煎五分溫溫服小兒傷寒裏不解發驚妄語狂躁潮熱釣藤大黃湯釣藤皮當歸甘草灸芍藥各半兩大黃三分粗末每三錢水一盞煎六分溫溫服以利為度難利者間茵蔯丸服方在傷寒門中此方不唯治傷寒常時小兒傷食作驚發癎不乳溫壯􅀈啀皆可斟酌與服以利為度傷寒總病論卷五

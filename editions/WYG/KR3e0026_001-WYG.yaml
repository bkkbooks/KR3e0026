body:
  text: 傷寒總病論卷一宋龎安時撰叙論龎曰素問云冬三月是謂閉藏水氷也地裂無擾乎陽又云彼春之暖為夏之暑彼秋之忿為冬之怒是以嚴寒冬令為殺厲之氣也故君子善知攝生當嚴寒之時周宻居室而不犯寒毒其有奔馳荷重勞房之人皆辛苦之徒也當陽氣閉藏反擾動之令鬱發腠理津液强漬為寒所摶膚腠反宻寒毒與榮衛相渾當是之時勇者氣行則己怯者則著而成病矣其即時成病者頭痛身疼肌膚熱而惡寒名曰傷寒其不即時成病則寒毒藏扵肌膚之間至春夏陽氣發生則寒毒與陽氣相𫝊于榮衛之間其患與冬時即病候無異因春温氣而變名曰温病也因夏暑氣而變名曰熱病也因八節虚風而變名曰中風也因暑濕而變名曰濕病也因氣運風熱相摶而變名曰風温也其病本因冬時中寒随時有變病之形態爾故大醫通謂之傷寒焉其暑病濕温風温死生不同形狀各異治别有法龎曰天寒之所折則折陽氣足太陽為諸陽主氣其經夾脊膂貫五臟六腑之腧上入腦故始則太陽受病也以其經貫五臟六腑之腧故病有臟府𫝊變之候以其陽經先受病故次第𫝊入隂經以陽主生故足太陽水𫝊足陽明土土𫝊足少陽木為微邪以隂主殺故木𫝊足少隂水水𫝊足厥隂木至第六七日當𫝊足厥隂肝木必移氣克于脾土脾再受賊邪則五臟六府皆危殆矣榮衛不通耳聾囊縮不知人則死速用承氣湯下之方在可下證中則可保五死一生勿従容拯溺令病人水漿不入湯液不下無可奈何也素問云脾熱病則五臟危又云土敗木賊則死若第六七日𫝊厥隂脈得微緩微浮其證寒熱似瘧此為必愈宜桂枝麻黄各半湯和之方在可汗證中微緩微浮為脾胃脈也故知脾氣全不再受克邪無所容否極泰来榮衛將復水升火降則寒熱作而大汗解矣人將大汗必冒昧者若乆旱天將雨時六合皆至昏昧雨降之後草木皆蘇庶物明净玉冊所謂換陽之吉證也王叔和云土地温凉髙下不同物性剛柔餐居亦異是以黄帝興四方之問歧伯立四治之能以訓後賢開其未悟臨病之工宜兩審之龎曰叔和非醫之圓機孰能臻此也如桂枝湯自西北二方居人四時行之無不應驗自江淮間地偏暖處唯冬及春可行之自春末及夏至以前桂枝麻黄青龍内宜黄芩也自夏至以後桂枝内故須随證增知母大青石膏升麻輩取汗也若時行寒疫及病人素虚寒者正用古方不在加减矣夏至以後雖宜白虎詳白虎湯自非新中暍而變暑病乃汗後解表藥耳以白虎未能驅逐表邪故也或有冬及始春寒甚之時人患斯疾因汗下偶變狂躁不解須當作内熱治之不拘于時令也南方無霜雪之地不因寒氣中人地氣不藏蟲類泄毒嵐瘴間作不在此法治别有方也又一州之内有山居者為居積隂之所盛夏氷雪其氣寒腠理閉難傷于邪其人夀其有病者多中風中寒之疾也有平居者為居積陽之所嚴冬生草其氣温腠理踈易傷于邪其人夭其有病者多中濕中暑之疾也凡人禀氣各有盛衰宿病各有寒熱因傷寒蒸起宿疾更不在感異氣而變者假令素有寒者多變陽虚隂盛之疾或變隂毒也素有熱者多變陽盛隂虚之疾或變陽毒也龎曰四時之中有寒暑燥濕風火相摶喜變諸疾須預察之其飲食五味禽魚蟲菜果實之屬性偏有嗜者或金石草木藥素嘗有餌者人五臟有大小髙下堅脆端正偏傾六府亦有大小長短厚薄緩急令人終身長有一病者貴者後賤富者乍貧有常貴有常富有暴富有暴貧有暴樂有暴苦有始樂後苦有離絶藴結憂恐喜怒者夫常貴後賤名曰脫營常富後貧名曰失精暴樂暴苦始樂後苦精竭體沮脫勢侯王精神内傷情慕尊貴妄為䘮志始富後貧焦皮攣筋常富惡勞驕墮精消􅄐間親愛者魂逰絶所懐者意喪藴所慮者神勞結怨恨者志苦憂愁者閉塞而不行盛怒者迷惑而不治恐懼者蕩憚而不收喜樂者撣散而不藏此皆非外邪所中而得之于内也良工必須審問其由先知臟府經絡受病之所可舉萬全工不思曉令五臟六府血氣􅄐守迨至不救又何言哉龎曰隂陽虚盛者非謂分尺寸也榮衛者表陽也腸胃者裡隂也寒毒争于榮衛之中必發熱惡寒尺寸俱浮大内必不甚躁設有微煩其人欲飲食欲温而惡冷謂陽虚隂盛也可汗之則愈若誤下則死也若寒毒相薄于榮衛之内而陽勝隂衰極隂變陽寒盛生熱熱氣盛而入裏熱毒居腸胃之中水液為之乾涸燥糞結聚其人外不惡寒必蒸蒸發熱而躁甚則讝語其脈浮滑而數或洪實或汗後脈雖遲按之有力外證已不惡寒腹滿而喘此皆為陽盛隂虚當下之則愈若誤汗則死也仲景載三等陽明是陽盛隂虚證矣調經論云陽虚則内熱陽盛則外熱隂盛則内寒以此别之若隂獨盛而陽氣暴絶必四肢逆冷臍築凑痛身疼痛如被杖面青或吐或利脈細欲絶名曰隂毒也須急炙臍下服以辛熱之藥令陽氣復生濈然汗出而解若陽獨盛而隂氣暴絶必發躁狂走妄言面赤咽痛身斑斑如錦文或下利赤黄脈洪實或滑促名曰陽毒也宜用針泄熱服以苦酢之藥令隂氣復生濈然汗出而解也龎曰夫邪逆隂陽之氣非汗不能全其天真素問云辛甘發散為陽謂桂枝甘草細辛薑棗附子之類能復陽氣也酸苦湧泄為隂謂苦参大青葶藶苦酒艾之類能復隂氣也酸苦之藥既折熱復隂亦當小汗而後利者經云身汗得而後利則實者可活是也華陀治法云傷寒病起自風寒入于腠理與精氣分争榮衛否鬲周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒身熱腰背强重此邪氣在表随證發汗則愈龎曰凡發汗須如常覆腰以上厚衣覆腰以下以腰足難取汗故也半身無汗病終不解凡發汗後病證仍存于三日内可二三發汗令腰脚周遍為度若病不解便可下之設令下後不解表裡邪亦衰矣足觀脈證調治七日内可期正汗為善也發汗後不可再行汗者始發熱惡寒今不惡寒但倍發熱而躁始脈浮大今洪實或沉細數始惺静今狂語此胃實陽盛再行汗藥即死須當下之有人始得病變陽盛之證須便下之不可拘日子淺深次第也病三日以上氣浮上部填塞胸闕頭痛胸中滿或多痰涎當吐之即愈龎曰若虚損及新産人不能吐者可服枳實散枳實細末米飲調二錢日可三四服若有虛寒手足冷及脈微弱者枳實二兩加桂枝一兩同末之如前服病五六日以上氣結在臟府故腹滿身重骨節煩疼當下則愈若小便少手足心并腋下不滋潤尚未可攻之當消息其候不可亂投湯藥虚其胃氣也以上解華陀治法太陽證尺寸俱浮者太陽受病也一二日發以上連風府故頭項痛而腰脊强此是太陽膀胱經屬水病源云小腸者非也太陽病發熱汗出惡風其脈緩者名為中風太陽病或已發熱未發熱必惡寒體痛脈隂陽俱緊者名為傷寒傷寒一日太陽受之脈若静者為不𫝊頗欲吐若煩躁脈數急者為𫝊也傷寒二三日陽明少陽證不見者為不𫝊也病發熱而惡寒邪發于陽也不熱而惡寒者邪發于隂也發于陽者七日愈發于隂者六日愈陽數七隂數六故也發于陽者随證用汗藥攻其外發于隂者用四逆輩温其内太陽病頭痛至七日以上自愈者其經竟故也若欲作再經者針足陽眀使經不𫝊補足陽明土三里穴也風者解表而不了了者十二日愈方言曰南楚疾愈或謂之差或謂之了太陽病初服桂枝湯反煩不解先刺風池風府却與桂枝湯則愈太陽病自汗四肢難以屈伸若小便難者可與陽旦湯内加附子一枚炮去皮尖八破同煎服之陽旦即桂枝湯異名若小便數者慎不可行此湯宜用芍藥甘草湯若誤行桂枝附子湯攻表則咽乾煩躁厥逆嘔吐者作甘草乾薑湯與之以復陽氣若厥愈足温更與芍藥甘草湯其脚即伸若胃氣不和讝語者少與調胃承氣湯微溏則讝語止芍藥甘草湯主脈浮而自汗小便數寸口脈浮大浮為風大為虚風則生微熱虚則兩脛攣小便數仍汗出為津液少不可誤用桂枝湯宜補虚退熱通治誤服湯後病證仍存者按古之三兩准今之一兩古之三升今之一升若以古方裁减以合今升秤則銖兩升合之分毫難以従俗莫若以古今升秤均等而减半為一劑稍增其枚粒乃便于俗爾且仲景方云一劑盡病證猶在者更作减半之劑此古方一劑又加其半庶可防病未盡而服之也有不禁人湯劑者再减半亦得肘後所謂或以一分為兩或以二銖為兩以盞當升可也貧家難辦或臨時抄撮皆可麄末毎抄五錢水兩平盞煎八分服之有薑棗者每服入薑三片棗三枚一日三服未中病可六七服也有不可作煮散者是病勢大宜依古方行之凡湯一劑有附子一枚增半之劑合用附子一枚半古方不析枚者是枚力要完也半兩以上大附子可當一枚半四錢以下者可用兩枚為准枚傷多不妨仲景云强人可加附子成兩枚是也芍藥甘草各二兩半細剉水一升半煎七合半去滓温温分再服甘草乾薑湯甘草二兩乾薑一兩煎如前方調胃承氣湯大黄一兩甘草半兩芒硝一大合細剉水一升煎上二味至五合去滓下芒硝烊化暖服一盞微溏為度如難利者再與一劑太陽病汗證反下之遂利不止脈促表未解也喘而汗出者葛根黄芩湯主之黄芩三錢黄連三兩甘草半兩葛根二兩細剉水一升煎七合半去滓温飲一盞日三服陽眀證尺寸俱長者陽明受病也當二三日發以其脈夹鼻絡于目故身熱目痛鼻乾不得卧此證惡寒可發汗若惡寒罷反自汗惡熱者為胃家實屬正陽明宜調胃承氣湯方在太陽證下龎曰有三陽陽明者其太陽陽明本太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明也少陽陽明者本𫝊到少陽因發汗利小便巳胃中燥大便難也正陽陽明者病人本風盛氣實津液消鑠或始惡寒汗出多寒罷而反發熱或始得病便發熱狂言也凡陽明證俱宜下唯中寒惡寒為病在經與太陽合病屬表可發其汗二陽合病脈必浮大而長外證必頭痛腰疼肌熱目疼鼻乾也浮大者太陽受病也長者陽明也頭腰太陽也肌目鼻陽明也二陽併病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者大承氣湯下之則愈方在可下證中二陽併病太陽初得時發其汗汗先出復不徹因轉屬陽明自微汗不惡寒若太陽證不罷不可下下之為逆如此者可小發其汗設面色正赤者陽氣怫鬱在表當解之蒸之若汗出不徹當短息不足言陽氣怫鬱不得越當汗出而不汗其人短氣但坐以汗出不徹故也宜麻黄湯更發其汗即愈何以知其汗不徹其脈澀故知也方在可汗證中古本字多差誤以従来所見病人證候中符合如此故改正陽明病能食為中風不能食為中寒陽明病中寒脈浮無汗其人必喘發汗則愈宜麻黄湯方在可汗證中陽明病脈遲汗出多微惡寒者表未解發汗則愈宜桂枝湯方在可汗證中若不惡寒為外解欲手足濈然汗出者大便已鞕宜大承氣湯方在可汗證中陽明病有不可攻者謂陽明病心下鞕滿者不可攻攻之利不止者死利止者愈陽明病或發汗或自汗大便雖鞕小便少者未可攻津液恐還入胃必先鞕後溏也小便自如乃可攻之陽明病中風口苦咽乾腹滿微喘發熱惡寒其脈浮緊若下之則腹滿小便難也此證必無汗與後證相似且惡寒無汗為異以咽乾腹滿亦不宜正與汗藥别與消詳也陽明病脈浮而緊咽乾口苦腹滿而喘發熱汗出不惡寒而反惡熱身重若發汗則煩躁憒憒反讝語若加温針必怵惕煩躁不得眠若下則胃中空虚客氣動鬲心中懊憹胎生舌上者梔子香䜴湯主之肥梔子十枚香豉二合水二升煮梔子减半下豉再煮八合去滓温服一盞得快吐者止後服脈浮緊必無汗而反有汗咽噪腹滿惡熱法當下之而又脈浮緊不當下此恐變風温宜細詳陽明病口鼻燥但潄水而不欲嚥者必衂少陽證尺寸俱弦者少陽受病也當二三日發以其脈上循脇絡于耳故胷脇痛而聾足少陽膽屬木弦者細長如琴弦狀仲景云脈浮而緊曰弦非謂此弦脈也凡傷寒脈浮緊相載皆屬弦之類也有屬太陽有屬陽明者少陽正得弦脈體是小弦長大脈也多宜和表鮮有汗證少陽之證口苦咽乾目眩也此三陽經皆病未入于藏可汗而解仲景少陽證雖小柴胡乃和表藥耳弦細頭痛發熱屬少陽宜小柴胡湯不可發汗發汗則讝語此屬胃胃和則愈不和則煩而躁宜調胃承氣湯此屬少陽陽明證也方在太陽證中本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食徃来寒熱尚未可吐下脈緊者小柴胡湯主之少加牡蠣若已吐下發汗温針讝語小柴胡湯證罷此為壊病知犯何逆以法治之知犯何逆者犯四種温病壊候也少陽中風兩耳微聞目赤胷中滿而煩不可吐下吐下則驚悸小柴胡湯主之方在和表證中三陽合病脈浮大上關上但欲眠睡合目則汗不言弦者隠于長大也三陽合病面垢讝語腹滿身重不能轉側遺尿發汗則讝語下之則額上生汗手足逆冷若自汗者宜白虎湯方在厥隂證中傷寒四五日或六七日無大熱其人躁悶此為陽去入隂也傷寒三四日陽為盡三隂當受邪其人反能食而不嘔此為三隂不受邪也病到隂必吐利傷寒三日少陽脈小者欲愈也小而平勻者也太隂證尺寸俱沉細者太隂受病也當四五日發其經布胃中絡于嗌故腹滿而嗌乾宜大承氣湯下之方在可下證中太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之必胷下結鞕自利不渴者屬太隂其藏有寒故也當温之以四逆輩傷寒三日太陽脈弱至四日太隂脈大脈大而胷滿多痰者宜吐之無此證者宜汗之傷寒脈浮緩亦大之類手足自温者繫在太隂小便不利者必發黄五苓散加茵陳主之若小便自利者不能發黄至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也橘皮湯主之五苓茵陳散以茵陳濃煎湯調五苓散二錢服之日三四黄従小便下以小便清為度橘皮湯橘皮一兩生薑二兩細剉水一升半煎七合去滓分二服稍熱呷未差再作服本太陽病醫反下之因爾腹滿時痛者屬太隂也桂枝芍藥湯主之桂枝一兩半芍藥三兩甘草一兩大􅀥六枚生薑一兩半㕮咀以水三升煮取一升半去滓毎温一盞日三服注云小建中湯不用飴糖故芍藥為君止痛復利邪故也少隂證尺寸俱沉者少隂受病也當五六日發以其經貫腎絡于肺繫舌本故口燥舌乾而渇大承氣湯下之方在可下證中少隂之為病脈微細于寐也少隂中風陽微隂浮為欲愈也凡少隂病四逆者宜温之少隂病始得之反發熱脈沉者麻黄細辛附子湯主之麻黄二兩細辛二兩附子一枚㕮咀以水三升先煮麻黄十數沸去上沫内諸藥煮取一升去滓每温一盞日三服少隂病得之二三日麻黄附子甘草湯微汗以二三日無陽證故微發汗也謂初得病二三日常見少隂證無陽者須發小汗也麻黄二兩甘草二兩附子一枚㕮咀以水三升先煮麻黄十數沸去上沫内諸藥煮取一升半去滓每温一盞日三服龎曰少隂病脈沉不知何沉也且沉緊發汗則動經沉數為病在裏不可發汗詳此脈或沉而濡或沉而微是表中寒而裡不消脈應裡而發熱在表故以小辛之藥温散而微微取汗也少隂病吐利手足不逆冷發熱者不死脈不至者灸少隂七壯太谿穴在内踝後跟骨上動脈陷中言發熱者謂其身發熱也少隂病吐利煩躁四逆者死煩躁者内煩躁也與茱萸湯證宜細審其生死也少隂病惡寒而勌居員切時時自煩不欲厚衣宜大柴胡湯方在可下證中少隂病四逆惡寒而自勌脈不至而吐利煩躁者死重詳定此少隂病下利利止而眩時自冒者死此合是少陽冒昧汗濈出脈匀小浮者生少隂無眩冒之證少隂病六七日息髙者死少隂病脈微細沈但欲卧汗出不煩自欲吐至五六日自利復煩躁不得卧寐者死少隂病得之二三日以上心中煩不得卧者黄連阿膠湯主之黄連一兩黄芩一分芍藥一分雞子黄半枚阿膠炙三分為末以水二升先煮三物取一升去滓内阿膠烊盡小冷内雞子黄攪令相得温温一盞日三四服少隂病下利清水色純清心下必痛口乾躁者大承氣湯下之方在可下證中少隂病吐利手足厥冷煩躁欲死者茱萸湯主之茱萸一兩半洗三遍人參三分生薑一兩半大􅀥三個以水三升半煮取一升半去滓每温一盞日三服少隂病咽痛者桔梗甘草湯主之桔梗半兩甘草一兩細剉水一升煎半升去滓作三服細呷之又半夏散亦主之半夏湯洗七遍桂枝去皮甘草炙右各等分各别搗篩已合治之每服三錢水一盞半煎至八分温冷少少嚥之少隂病下利清榖裏寒外熱手足厥逆脈微欲絶身反不惡寒者其人面赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之甘草一兩附子大者半個强人加半個乾薑三分强人加一兩半細剉水三升煎至一升去滓每温服一盞日三四服未差急更作一劑不可作煮散其脈續續出者愈暴出者死面赤者加連須葱四莖去青腹痛去葱加芍藥一兩嘔者加生薑一兩咽痛者去芍藥加桔梗半兩利止脈不出者去桔梗加人参半兩病與方皆相應者與服之少隂病下利六七日欬而嘔渴心煩不得眠者宜猪苓湯猪苓茯苓澤瀉滑石阿膠各半兩㕮咀以水二升先煮四物取一升去滓内阿膠末烊盡每温一盞服少隂病下利咽痛胷滿心煩猪膚湯主之猪膚半斤以水五升煮取二升半去滓加白蜜半斤白粉二合半熬香和令相得每温服一盞日三四服少隂病四逆其人或欬或悸或小便不利或腹中痛或泄利下重者四逆散主之甘草枳實柴胡芍藥各任分𢷬篩為細末白飲和服方寸匕日三服欬者加五味子乾薑炮各二分半并主下利悸者加桂枝二分半小便不利者加赤茯苓二分半腹痛者加附子一個炮去皮臍泄利下重者先以水三升薤白一升半煮取二升去滓以散方寸匕用薤白湯一盞煎八分日三四服厥隂證尺寸俱微者厥隂受病也六七日發以其脈循隂而絡于肝故煩滿而囊縮㣲緩者囊必不縮若外證發熱惡寒似瘧為欲愈候宜桂枝麻黄各半湯也若尺寸俱沉短者囊必縮宜承氣湯下之方在可下證中厥隂之為病消渴氣上衝心中痛熱飢而不欲食食則吐蚘下之利不止烏梅丸主之傷寒脈微而厥至七八日膚冷其人躁無暫安者此藏厥非蚘厥也蚘厥者其人當吐蚘令病者靜而復煩也此藏寒蚘上上入其鬲故煩須臾復止得食而嘔又煩者蚘聞食臭即出其人常自吐蚘蚘厥者烏梅丸主之又治久痢藏厥宜四逆輩極冷服之烏梅一百五十个乾薑五兩黄連八兩當歸二兩川椒桂枝附子人參黄蘗細辛各三兩異擣篩合治之以苦酒浸烏梅一宿去核蒸之二斗米下飯熟𢷬成泥和藥令相得内臼中與蜜再杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑臭食物等厥隂中風脈微浮者為欲愈不浮為未愈脈遲反以黄芩湯得徹其熱腹中應冷當不得食今反能食此為除中必死先厥後發熱下利必自止而反汗出咽痛者其喉為痺發熱無汗其利自止若不止必便膿血者其喉不痺龎曰熱少微厥指頭寒嘿嘿不欲食煩躁數日小便自如此熱除也宜乾薑甘草湯方在太陽證中龎曰手足逆冷皆屬厥隂不可下亦不可汗有須下證者謂手足雖逆冷而手足掌心必煖非正厥也故可消息汗下也傷寒一二日至四五日厥者必發熱前發厥者後必發熱厥甚熱亦甚厥微熱亦微不過五日六日不厥者必愈若六日厥者必發熱愈甚仍下利也龎曰寒熱而厥面色不澤冒昧者當用緜衣包手足令温煖必大汗而解也有不因大汗下而兩手忽無脈謂之雙伏或一手無脈謂之單伏或利止如此必有正汗急用四逆輩温之時有汗便安脈終不出者死下利先厥後發熱利必自止不爾咽中痛或喉痺若便膿血者其喉不痺厥而下利者當不能食反能食者為除中必死能食反發熱脈數者必發癰膿厥而嘔胸脇煩滿後必便膿血病者手足冷少腹按之痛此結冷在膀胱關元也當闗元炙之發熱下利厥逆躁不得卧者死病人手足厥冷脈乍緊者邪結在胸中心下滿而煩不能飲食者病在胸中當吐之宜𤓰蒂散凡病可吐者皆宜此方𤓰蒂赤小豆等分細末别以香豉一合熱湯三盞煮作稀糜去滓取汁和散一錢温温頓服不吐者少少加藥再服得吐快乃止諸亡血虚家不可與服有用丁香者吐之多霍燥人傷寒厥而心下悸宜先治水當服茯苓甘草湯次治其厥不爾水漬入胃必作利也茯苓甘草湯茯苓桂各兩一生薑一兩半甘草半兩細剉水二升煎一升温飲一盞悸止為度傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治宜麻黄升麻湯有不因下而自利加衂血者允宜此方麻黄一兩升麻當歸各半兩知母黄芩萎蕤各三錢芍藥天門冬桂枝茯苓甘草石膏白术乾薑各一錢半細剉水二升半先煮麻黄一二沸去沫内諸藥煮一升二合去滓温服一盞如人行七八里乆進一服以汗出即住服本自汗下復吐下之寒愈格逆食入口即吐宜乾薑黄芩湯乾薑黄芩黄連人參各一兩半細剉水三升煮取一升半去滓温服一盞下利微熱而渴脈弱者自愈脈數汗出亦然緊為未解發熱而厥七日下利為難治凡厥通用四逆湯方在四逆證中謂其脈浮遲或微或細或沉皆屬裡有寒也厥而脈滑者為裡有熱白虎湯主之知母石膏八兩甘草半兩粳米三合以水五升煮米熟湯成去滓温服一盞日三服有渴加人參半兩龎曰三陽皆有合病凡合病者有十四證唯三隂無合病兩感證龎曰素問載兩感于寒其脈應與其病形者一日則巨陽與少隂俱病頭痛而煩滿二日則陽明與太隂俱病腹滿身熱不欲食讝語三日則少陽與厥隂俱病則耳聾嚢縮而厥水漿不入口不知人六日死言其六日死者是藏府榮衛或有所通行故四日少隂與太陽俱病五日太隂與陽明俱病六日厥隂與少陽俱病是重𫝊得六日死矣其有三日死者素問謂陽明為五藏十二經脈之長其邪氣盛故不知人三日其氣乃絶故死矣夫邪氣盛則實表裏邪實併領血氣入胃不通于榮衛氣血故氣血随邪而盡則三日死矣其脈候素問已脫今詳之凡沈者皆屬隂也一日脈當沈而大沈者少隂也大者太陽也二日脈當沈而長三日脈當沈而弦乃以合表裏之脈也沈長沈弦皆隠于沈大凡隂不當合病唯三陽可以合病今三隂與三陽合病故其脈似沈緊而大似沈實而長亦類革至之死脈也三隂三陽𫝊病證龎曰傷寒一日巨陽受病前所說膀胱詳矣病源云小腸雖則誤其標本其手足隂陽自有併病者故素問云六日三隂三陽五藏六府皆受病榮衛不行五藏不通則死矣是表裏次第𫝊不必兩感亦有至六日𫝊遍五藏六府而死者也素問云諸浮不躁者皆在陽則為熱其有躁者在手假令第一日脈不躁是足太陽膀胱脈先病脈加躁者又兼手太陽小腸也又云諸細而沉者皆在隂則為骨痛其有静者在足假令第四日脈静者足太隂始𫝊病也脈加數又兼手太隂病也故六日亦能𫝊遍藏府也躁謂脈數静謂脈不數用藥則同若用鍼須取足與手之經也傷寒總病論卷一

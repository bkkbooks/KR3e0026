body:
  text: 傷寒總病論卷四宋龎安時撰暑病論龎曰冬傷於寒夏至後至三伏中變為暑病其重温也有如傷寒依三隂三陽傳見五藏熱證者各隨證治之暑病表證暑病代桂枝并葛根證桂枝芍藥知母生薑各一兩半甘草一兩黄芩一兩半葛根二兩棗十六枚㕮咀水六升煮取三升通口服一盞相次取汗暑病代麻黄證桂枝杏仁知母各一兩麻黄三兩甘草黄芩各一兩煎如前法暑病代青龍湯証麻黄二兩石膏三兩知母桂枝甘草各一兩杏仁三十枚生薑一兩半棗十六个如前煎服暑病代葛根麻黄證葛根二兩麻黄一兩半桂枝甘草知母黄芩芍藥各一兩生薑一兩半棗十六个如前煎服暑病三日外至七日不歇内熱令人更相染大青消毒湯大青芒硝各二兩山梔子一兩石膏四闕兩二升濕地黄半升㕮咀水七升煮取三升去滓下芒硝化之温服一盞以熱除為度暑病通用白虎一如傷寒與暍證用之方在厥隂證中暑病通用麥奴丸方在雜汗證中暑病若吐下後别見形一如傷寒門治之暑病噦逆發斑瘡痘壊一如温病門治之已上四條先生所論預防熱病急黄賊風葛粉散葛粉二升生乾地黄一升香豉半升細末食後服方寸匕牛乳蜜湯竹瀝米飲烏梅湯任性調下日三服有病者日五服素問載五種暑病肝熱病者先左頰赤肺熱病者先右頰赤心熱病者顔先赤顔額也腎熱病者頤先赤頤頰也脾熱病者鼻先赤上主中央病雖未發見赤色刺之名曰治未病肝熱病者先小便黄腹痛多卧身熱熱争則狂言及驚脅滿痛手足躁不安卧庚辛甚甲乙大汗氣逆則庚辛死刺足厥隂少陽其逆則頭痛員員脉引衝頭也心熱病者先不樂數日乃熱熱争則卒心痛煩悶喜嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少隂太陽脾熱病者先頭重頰痛心煩顔青欲嘔身熱熱争則腰痛不可俛仰腹滿泄兩頷痛甲乙甚戊巳大汗氣逆則甲乙死刺足太隂陽明肺熱病者洗淅然厥起毫毛惡風寒舌上黄身熱熱争則喘咳痛起走胷膺背不得太息頭痛不任汗出而惡寒丙丁甚庚辛大汗氣逆則丙丁死刺手太隂陽明出血如豆大立已腎熱病者先腰痛䀪疫舌渴數飲水身熱熱争則項痛員員澹澹然戊巳甚壬癸大汗氣逆則戊巳死刺足少隂太陽諸汗者至其所勝日汗出也龎曰五種熱病肝腎二藏有逆證心脾肺三藏亡逆證凡五種熱病二三日逢尅未為逆忌在五六日也時行寒疫論病源載從立春節後其中無暴大寒又不冰雪而人有壯熱病者此屬春時陽氣發於冬時伏寒變為温病也從春分以後至秋分節前天有暴寒皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與温病暑病相似但治有殊耳其治法初用摩膏火炙唯二日法鍼用崔文行解散汗出愈不解三日復發汗若大汗而愈不解者勿復發汗也四日服藜蘆丸微吐愈若病困藜蘆丸不吐者服赤小豆苽蒂散吐之已解視病尚未了了者復一法鍼之當解不解者六日熱已入胃乃與雞子湯下之愈無不如意但當諦視節度與病耳食不消病亦如時行俱發熱頭痛食病當速下之時病當待六七日時病始得一日在皮二日在膚三日在肌四日在胷五日入胃入胃乃可下也熱在胷外而下之熱乘虚入胃然要當復下之不得下多致胃爛發斑微者赤斑出五死一生劇者黒斑出九死一生人有強弱相倍也病者過日不以時下之熱不得泄亦胃爛斑出矣若得病無熱但狂言煩躁不安精神言語不與人相主當者治法在可水五苓散證中此巢氏載治時行寒疫之法焉温病暑病相似但治有殊者據温病無摩膏火炙又有冬温瘡痘更有四時藏腑隂陽毒又夏至後有五種熱病時令盛暑用藥稍寒故治有殊也時行寒疫治法初得時行赤色頭痛項強兼治賊風走㾏寒痺趙泉黄膏大黄附子細辛川椒乾薑桂枝各一兩巴豆五十粒㕮咀苦酒漬一宿以臘月猪膏一斤煎調火三上三下去滓收之傷寒赤色熱酒調服梧桐子大一枚又以火摩身數百遍兼治賊風最良風走肌膚追風所在摩之神效千金不𫝊崔文行解散時氣不和傷寒發熱桔梗炒細辛各四兩白术八兩烏頭炮一斤細末傷寒服一錢五銖匕不覺復小增之以知為度若時氣不和旦服一錢五銖匕辟惡欲省病一服了去此時行寒疫通用之無病者預服以辟寒為佳皆酒調下藜蘆散辟温疫傷寒藜蘆躑躅乾薑各四分牡丹皮皁角各五分細辛附子各三分桂枝朱砂各一分末之絳囊帶一方寸匕男左女右臂上着之覺有病之時更以粟米大内鼻中酒服一錢匕覆取汗日再當取一汗耳赤小豆𤓰蒂散在厥隂證中雞子湯治熱盛狂語欲走生雞子七枚芒硝一兩井華水一大升同攪千遍去沫頻服之快利為度猪苓散即傷寒門五苓散也在可水證中已上五方載巢氏治時行寒疫合用之方龎曰摩膏火炙可行於西北二方餘處難施莫若初服解散赤散之類如轉發熱而表不解乃行後四方為佳天行壯熱煩悶無汗者麻黄葛根湯麻黄五兩葛根四兩麄末每服五錢水二盞梔子二个蔥白五十豉一撮煎八分去滓沫温温相次四五服取汗止後服天行一二日麻黄湯自汗者去麻黄加葛根二兩麻黄二兩石膏一兩半貝齒五个無亦得升麻甘草芍藥各一兩杏仁四十个麄末毎服五錢水二盞煎八分温服取汗止後服葛根解肌湯汗後表不解宜服此自汗者去麻黄葛根四兩麻黄芍藥大青甘草黄芩桂枝各二兩石膏三兩煎如前法詔書發汗白薇散治時氣二三日不解白薇二分杏仁三分貝母三分麻黄七分細末酒調下方寸匕相次二三服温覆汗出愈湯調亦得聖散子方此方蘓子瞻尚書所𫝊有序文昔嘗覽千金方三建散於病無所不治而孫思邈特為著論以謂此方用藥節度不近人情至於救急其驗特異乃知神物效靈不拘常制至理開感智不能知今予所得聖散子殆此類也歟自古論病唯傷寒至危急表裏虚實日數證候應汗應下之法差之毫釐輒至不救而用聖散子者一切不問隂陽二感或男女相易狀至危篤者連飲數劑則汗出氣通飲食漸進神宇完復更不用諸藥連服取差其餘輕者心額微汗正爾無恙藥性小熱而陽毒發狂之類入口即覺清涼此殆不可以常理詰也時疫流行平旦輒煑一釜不問老少良賤各飲一大盞則時氣不入其門平居無病能空腹一服則飲食快美百疾不生真濟世衛家之寳也其方不知所從來而故人巢君榖世寳之以治此疾百不失一二予既得之謫居黄州連歳大疫所全活至不可數巢君初甚惜此方指江水為盟約不𫝊人予竊隘之乃以𫝊蘄水人龎君安常龎以醫聞於世又善著書故以授之且使巢君之名與此方同不朽也其用藥如左肉荳䓻十个木猪苓石菖蒲茯苓髙良薑獨活柴胡吴茱萸附子炮麻黄厚朴薑炙藁本芍藥枳殻麩炒白术澤瀉霍香吴术蜀人謂蒼术之白者為白术蓋茅术也而謂今之白术為吴术防風細辛半夏各半兩薑汁制甘草一兩剉焙作煮散每服七銖水一盞半煎至八分去滓熱服餘滓兩服合為一服重煎皆空心服治時氣傷寒頭痛身熱腰背強引頸及中風口噤治瘧不絶婦人産中風寒經氣腹大華佗赤散方丹砂二分蜀椒蜀漆乾薑細辛黄芩防己桂枝茯苓人參沙參桔梗女萎烏頭常山各三分雄黄吴茱萸各五分麻黄代赭各十分除細辛丹砂乾薑雄黄桂外皆熬治作散酒服方寸匕日二耐藥者二匕覆令汗出治瘧先發一時服藥二匕半以意消息之烏頭赤散治天行疫氣病烏頭六分皁角雄黄細辛桔梗大黄各一兩細末清酒或井花水服一刀圭日二不知稍增以知為度除時氣不和一日進一服牛馬六畜中天行瘴疫亦以方寸匕人始得病一日時服一刀圭取兩豆許内鼻孔中斑痘瘡論龎曰天行豌豆瘡自漢魏以前經方家不載或云建武中南陽征虜所得仍呼為虜瘡其後名毉雖載發斑候是發汗吐下後熱毒不散表虚裏實熱氣燥於外故身體發斑又說豌豆疱瘡表虚裏實一如發斑之理别云熱毒内盛攻於臟腑餘氣流於肌肉遂於皮膚毛孔中結成此瘡既是裏實熱毒内盛則未發及欲發瘡斑未見皆宜下之也瘡已差則再下之此病有二種一則發斑俗謂之麻子其毒稍輕二則豌豆其毒最重多是冬温所變凡覺冬間有非節之暖瘡毒未發即如法下之次第服預防之藥則毒氣内消不復作矣有不因冬暖四時自行者亦如法下之古方雖有治法而不詳僃疑當時毒熱未甚鮮有死者耶近世此疾歳歳未嘗無也甚者夭枉十有五六雖則毒氣内壊不治因毉為咎又大半矣若身疼壯熱頭痛不與小汗何由衰散大腑久秘毒攻腰脇或心腹脹滿不與微利何由病去故當消息汗下然則寒藥固不當行温藥反增熱毒若熱勢大盛脉候決數涼性之藥不阻表裏氣亦可通用若寒氣阻礙脉候浮遲則温性之藥不阻表裏氣者可冀冰釋云不可汗下寒熱之藥只可紫草一味者乃滯隅之流祇是遭逢輕疾以自差為功若值重病則拱手待斃矣世有權貴自信不任人拘忌冷熱汗下病或不救則責毉謬誤斯又可為傷歎夫調瑟者必當移柱故用古方附以愚見為斑痘方以小兒多染此患故專用小湯劑大人可倍用之温病發斑治法小兒證附冬月觸冒寒毒者至春始發病病初至表或已發汗吐下而表證未罷毒氣不散故發斑瘡又冬月天氣温暖人感乖候之氣未即發病至春又被積寒所折毒氣不得泄至夏遇熱其春寒已解冬温毒始發出於肌膚斑爛𨼆􅇙如錦文也治温毒發斑大疫難救兼治豌豆瘡不出地黄膏濕地黄四兩好豉半升以猪膏一斤和匀露一宿煎五七沸令三分去一絞去滓下雄黄末一錢匕麝香末半錢匕攪匀稍稍盡飲之毒從皮中出則愈小兒斟酌服冬温未即發病至春被積寒所折不得發至夏得熱其春寒解冬温毒始發於肌中斑爛隠􅇙如錦紋而欬悶嘔吐清水宜服黄芩麻黄湯葛根橘皮杏仁生麻黄知母黄芩甘草各半兩㕮咀水二升煮八合去滓温温分減服之嘔吐先定便宜消息不嘔者去橘皮肺腑臟熱暴發氣斑不可作煮散香豉石膏湯香豉二合葱鬚一兩石膏二兩梔子三分生薑二兩大青升麻芒硝各三分㕮咀水三升煮取一升三合去滓下芒硝温温分減服温病發斑赤斑者五死一生黑斑者十死一生大疫難救黑奴丸主之方在雜汗證中冬温至夏發斑欬而心悶嘔清汁眼赤口瘡下部亦生瘡或自下利黄連湯黄連一兩橘皮杏仁麩炒枳寔麻黄葛根厚朴甘草各一分㕮咀水三升煮一升二合去滓温温分減服下利先止别當消息小兒斟酌天行發斑瘡須臾徧身皆戴白漿此惡毒云永徽四年此瘡自西域東流於海内但煮葵菜蒜虀啖之則止鮮羊血入口即定初患急食之作菜下飯亦得小兒時行瘡痘恐相𫝊染先服漏蘆湯下之本治熱毒癰疽赤白諸丹熱毒瘡癤以下皆是小兒湯劑漏蘆葉無以山梔子代之連翹白歛甘草芒硝各一分升麻枳實麻黄黄芩各一分半大黄四分㕮咀水二升煮一升半下大黄煮一升去滓下芒硝分減服以利為度大人服可倍作大黄水浸少時和水下龎曰凡覺冬温至春夏必發斑痘小兒輩須服漏蘆湯下之得下後逐日空心飲甘草汁三歳以上一盞兒小減之直候腹疼乃止未疼可飲至十日則永不發或下後飲羊血一盞則不發治時行豌豆瘡樺皮飲子樺皮二兩細切水一升煮至半升去滓飲汁分減服龎曰初得病便驚狂不眠渾身爇然汗出問之身不增寒亦不惡風其脉如數以漏蘆湯下之不甚數者以大承氣湯下之非但瘡痘傷寒亦然治豆瘡毒氣不出煩悶熱毒氣攻腰或腹脇痛不可忍大便不通五香湯主之麝香半分木香丁香沈香乳香各一分芍藥枳實射干連翹黄芩麻黄升麻甘草各半兩大黄一兩闕四錢水一盞竹􅅹半盞煎八分去滓下朴硝一錢匕和服以利為度天行熱氣生瘡疱身痛壯熱水解散麻黄一兩黄芩桂枝甘草各半兩細末煖水調下二錢匕小兒一錢覆令小汗熱氣在表已發汗未解或吐下後熱毒不散煩躁謬語此為表虚裏實熱氣躁於外故身體發斑如錦紋或不因汗下始得病一二日便發皆由温疫熱毒氣使然也甚則發豌豆瘡其色白或赤發於皮膚頭作漿戴白膿者其毒則輕有紫黒色作根隠隠在肌肉裏其毒則重十死一生甚者五内七竅皆有瘡形如豌豆故以名焉脉洪數者是其候也天行熱毒未解欲生豌豆發熱疼痛宜服解肌出汗葛根石膏湯葛根麻黄各一兩石膏二兩黄芩芍藥桂枝甘草各半兩麄末每服四錢水一盞半煎八分温服取小汗自汗者去麻黄斑豆始有白疱忽搐入腹漸作紫黒色無膿日夜呌煩亂者鬱金散鬱金一枚甘草一分水半椀煑乾去甘草片切焙乾為細末真腦子炒半錢同研每一錢匕以生猪血五七滴新汲水調下不過二服甚者毒氣從手足心出如癰狀乃差此是五死一生候也此患小便澀有血者中壊也瘡黒厭無膿十死不治斑煩喘小便不利鼈甲湯燈心一把鼈甲二兩水一升半煎六合去滓温分作二服斑痘定煩喘淡竹􅄋飲子淡竹􅅹煖飲之煩喘自汗瘡不作黒厭可治定煩喘麻黄甘草湯麻黄杏仁桑白皮甘草各一分㕮咀水一升煎四合放温分減服若脉數有熱以竹􅅹代水一半煎之𠻳或喉痛加射干一分斑痘瘡出不快紅花湯紅花子一合槌碎水半升煎百沸去滓分減服之斑痘服涼藥太過欬𠻳手足冷脉遲甘草乾薑湯乾薑半兩甘草一兩㕮咀水一升半煎六合分作二服常行瘡痘紫草湯最良患其服之太少不能中病但多槌切好紫草以湯沃之用物合定候温去滓分減服每紫草半升用湯一升為準也斑痘已出不可正爾發表更增斑爛以表虚故也豌豆瘡欲出甘草湯甘草四兩細剉水二升煎一升去滓分減温服覺腹中微利即止油飲子飲清油一升即不生豌豆斑瘡不快表裏不解煩喘大便秘氣攻腹滿犀角升麻湯麻黄一分半木香犀角升麻芍藥甘草杏仁枳實雄黄各一分大黄半兩麝香一錢㕮咀水二升煎一升半下大黄再煎一升去滓下雄麝末沸匀分作三服以大便通為度瘡已出定方芒硝猪膽和研匀塗之勿動痂落無瘢仍卧黄土末上良天行瘡痘預服此則不發三豆飲子赤小豆黒豆菉豆各一升甘草一兩浄淘水八升煮熟逐日空心任性食豆飲汁七日永不發瘡痘發斑下利赤黄或膿血遍身發熱梔子薤豉湯好豉半升薤白二兩肥梔子十六枚水二升半煮梔子薤白將爛下豉再煮十數沸去滓分減服解下惡物差傷寒總病論卷四

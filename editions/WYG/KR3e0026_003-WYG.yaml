body:
  text: 傷寒總病論卷三宋龎安時撰結胷證病發於陽而反下之熱入内作結胷其病心下堅滿按之如石鞕而痛項强如柔痓狀其脉寸口浮闗上尺中皆沈或沈𦂳名曰結胷也下之則和宜大陷胷湯今作煮散煎之大黄一兩半芒硝一兩八錢半甘遂末一字異末先以水一升半煎大黄半升絞去大黄滓下硝末更煮一二沸内甘遂末和匀温分二服一服快利止後服如作煮散即先以水一盞煎大黄末四錢匕至八分下硝末二錢匕候化匀下甘遂末半錢匕沸匀温服之移時未利再煎一服快利為度藏結如結胷狀飲食如故時時下利寸口脉浮闗上脉小細沈緊名曰藏結舌上白苔生者難治藏結無陽證不往來寒熱其人反靜舌上苔滑不可攻也結胷證其脉尺寸浮大者不可下下之則死結胷證悉具煩躁甚者死太陽病脉浮而動數浮則為風數則為熱動則為痛數則為虚頭痛發熱㣲盜汗出而反惡寒表未解也醫反下之動數變遲鬲内拒痛胃中空虚宿熱動鬲短氣煩躁心下懊憹陽氣内陷心下固鞕則為結胷大陷胷湯主之若不結胷但頭汗餘處無汗齊頸而還小便不利身必發黄也結胷無大熱者此為水結在胷脇也但頭㣲汗出者宜大陷胷湯太陽病重發汗而復下之不大便五六日舌躁而渇日晡則少有潮熱從心下至小腹滿而痛不可近者宜大陷胷湯虚弱家不耐大陷胷湯即以大陷胷丸下之結胷者項亦强如柔痓狀下之則和宜大陷胷丸大黄四兩葶藶子一兩半朴硝一兩八錢杏仁二合杵二味内杏仁朴硝合研如脂丸如彈子大抄甘遂末一錢白蜜二合水二升煮取一升温頓服之一宿乃下不下更服小結胷正在心下按之則痛脉浮滑者宜小陷胷湯半夏六錢半黄連一分栝樓一枚用四錢㕮咀水三升煮栝樓至二升下諸藥煮取一升去滓温温服一盞食頃再服一日盡劑㣲解下黄涎即愈太陽病下之脉促者不結胷此為欲解也脉浮者必結胷脉𦂳者必咽痛脉弦者必兩脇拘急脉細數者頭痛未止脉沈𦂳者必欲嘔脉沈滑者恊熱而利脉浮滑者必下血寒實結胷無熱證者與三物白散方小陷胷者非也桔梗三分巴豆一分貝母三分細末内巴豆研匀白飲調下一錢羸人減之病在鬲上必吐在鬲下必利未利啜熱粥投之利過不止飲冷粥止之龐曰近世治結胷多行針頭丸用硫黄陽起石者若病熱毒甚者必死唯治冷結寒實耳心下痞證病發於隂而反下之為痞發熱惡寒為陽誤下則為結胷無熱惡寒為發於隂誤下則為痞氣傷寒下之後若發熱汗出者為欲解若心下滿而鞕痛者此為結胷也但滿而不痛此為痞氣宜半夏㵼心湯甘草黄芩乾薑人參各一兩半黄連半兩大􅀥六枚半夏一兩一分㕮咀水六升煮取三升去滓再煎一升半温温飲一盞日三夜二設下後津液入裏胃虚上逆寒結在心下故宜辛甘發散半夏下氣苦能去濕兼通心氣又甘草力大故乾薑黄連不能相惡也心下痞按之濡其脉闗上浮者宜大黄黄連㵼心湯大黄一兩黄連黄芩各半兩㕮咀以鰕眼沸湯一升漬之須臾絞去滓温温分四服得利止後服寒濕迫心氣不行欲作熱也心下痞悶而復惡寒汗出者大黄黄連㵼心湯内加附子主之附子一枚炮去皮尖四破以水三合煎一合去附子以附子汁内湯中和匀服之與㵼心湯而痞不解其人渴而口乾燥小便不利者五苓散主之方在可水證中傷寒汗出解之後胃中不和心下痞鞕乾噫食臭脇下有水氣腹中雷鳴下利宜生薑㵼心湯生薑二兩人參甘草黄芩各一兩半半夏一兩一分大棗六枚黄連乾薑各半兩㕮咀水五升煮取三升去滓再煎取一升半温作四服胃中不和為少陽水氣所制故用二薑之辛味傷寒中風醫反下之其人下利日數十行榖不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虚客氣上逆故使鞕也甘草㵼心湯主之甘草二兩黄芩乾薑人參各半兩半夏一兩一分大􅀥六枚黄連半兩㕮咀水五升煎至三升去滓再煎取一升半温作四服胃虚故加甘味大下後復發汗心下痞惡寒者表未解不可攻痞當先解表表解乃可攻痞攻痞宜大黄黄連㵼心湯前加附子是汗出多而惡寒表汗解而裏結未除故也此證是發後無汗惡寒故先須解表也傷寒發熱汗出不解心下痞鞕吐嘔下利者大柴胡湯主之汗出嘔吐下利是胃中津液燥裏有結實非胃虚也故以大柴胡湯下之病人脇下素有痞連臍傍引小腹入隂筋者此為藏結死陽毒證初得病一二日便成陽毒或服藥吐下後變成陽毒其病腰背痛煩悶不安狂言欲走或見鬼或下利其脉浮大而數面赤發斑如錦紋咽喉痛吐下膿血五日可治七日不可治升麻湯主之不可作煮散升麻當歸甘草各二分雄黄研一分桂枝一分鼈甲半兩蜀椒半分㕮咀水二升煎一升去滓温服一盞食頃再服温覆手足出汗汗出則解未解重作之得吐尤佳陽毒宜葛根龍膽湯方在雜發汗證中隂毒證初得病一二日便成隂毒或服藥六七日以上至十日變成隂毒其病身重背强腹中絞痛咽喉不利毒氣攻心心堅强氣不得息嘔逆唇青面黒四支厥冷其脉沈細而𦂳仲景云隂毒之候如被杖喉咽痛五六日可治七日不可治甘草湯主之不可作煮散甘草鼈甲升麻當歸桂枝各二分蜀椒一分雄黄一個㕮咀水三升煎取一升去滓温温每飲一盞食頃再服温覆中毒當汗吐之汗吐則愈不吐再服之治隂毒反隂丹硫黄五兩研末太隂𤣥精石味鹹者研末硝石研末各二兩用鐵銚子先鋪𤣥精石一半次鋪硝石一半中間下硫黄又以硝石蓋硫黄都以𤣥精石蓋之用盞子合定令三斤炭火燒令得所勿以烟出多急取出以瓦盆合定地下四面灰擁勿令烟出直候冷取細研蒸餅心丸豌豆大艾湯下十五丸病重加至二三十丸此法甚驗喘促吐逆者入口便安服此藥三五服覺不退便於臍下一寸半灸之須是大炷百壯未愈可至二百壯若手足極冷小便澀小腹鞕㽲痛囊縮即須更於臍下四寸如前炙之乃與當歸四逆并反隂丹頻頻與服内外通遂方可解若稍緩即死矣當歸四逆乃加吳茱萸生薑者是慎勿與尋常利小便藥此是隂毒氣結在小腹所致也有見小便不通便用炒鹽及裏熱藥熨臍下欲望小便通利其冷氣在小腹之間被熱物所熨無處通出即奔上衝心其死速矣又治隂毒硫黄丸硫黄二兩水銀一兩同研入銚洒少醋慢火炒欲似烟出再出火洒醋如此三四遍地上放冷研之蒸餅丸梧桐子大每服二十三十丸艾湯吞下日三服食前隂毒脉沈㣲欲絶四支逆冷大躁而渴不止附子飲子附子一枚半兩以上者炮去皮尖四破以水九升煎至三升去附子入瓶油單𦂳封沈井底候極冷取飲之仍下硫黄丸甚妙隂毒之為病因汗下藥性冷所變多在四五日也或素來陽氣虚冷始得病便成隂毒或始因傷風傷冷物便成隂毒其病六日内可治過六日不可治狐惑證狐惑之為狀如傷寒或因傷寒變成斯疾其候黙黙欲眠目不得閉卧起不安蝕於喉為惑蝕於隂為狐不欲飲食惡聞食臭其面乍黑乍白上部則聲嗄甘草㵼心湯主之方在痞證中蝕於下部則咽乾蝕於肛門者燒雄黄薰之雄黄一味燒薰下部病者脉數則熱㣲煩黙黙但欲卧汗出初得之三四日目赤如鳩眼七八日則兩目四眥周皆黑若能食者膿已成也赤小豆當歸散主之赤小豆一升浸生芽曝乾當歸一兩細末漿水調下二錢日三服百合證龐曰百合病者百脉一宗悉致其病意欲食復不能食常黙黙欲卧復不能卧欲出行復不能行或有美食時或惡聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則增劇吐利者如有神祟者身形如和其脉㣲數每溺時頭痛者六十日乃愈若溺頭不痛浙然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或二十日或一月㣲見者隨證治之治汗後百合病百合知母湯百合十枚知母一兩半百合先洗漬一宿當白沫出去其漬水别以清泉水一升半煮百合取一升去滓又别以泉水一升煮知母取半升去滓同百合湯煎至一升温分三服治下後百合病滑石代赭湯百合十收滑石一兩半代赭半兩先以水漬百合一宿當白沬出則去其水更以泉水一升半煮取一升去滓别以泉水一升煮滑石代赭取半升去滓合和重煎至一升分温三四服治吐後百合病百合雞子湯百合十枚雞子黄十枚先以水洗百合漬一宿當白沫出去其水更以泉水一升煮取一升去滓下雞子黄攪匀分温三服治不經吐下發汗百合病形如初者百合地黄湯百合十枚地黄汁半升先以百合水漬一宿有白沫出去其水更以泉水一升半煮取一升去滓内地黄汁再煮取一升二合温温分三服中病勿更服治百合病一月不解變成渴者百合湯洗之百合一升如煎洗先漬一宿當白沫出去其水更以水一㪷煎數沸洗周身慎風仍食白湯餅但勿與鹽豉也煮餅是切麵條湯煮水淘過熱湯漬食之渴不差栝樓牡蠣散主之栝樓無黄脉者牡蠣粉等分細末水調方寸匕日三服治百合病變發熱百合滑石散百合一兩滑石三兩細末清飲調方寸匕日三服當㣲利熱則除已利勿服之百合病見於隂者以陽法救之見於陽者以隂法救之見陽攻隂復發其汗此為逆見隂攻陽乃復下之此亦為逆痓濕暍證傷寒所至太陽病痓濕暍此三種宜應别論以為傷寒相似故此見之痓證太陽病發熱無汗反不惡寒名曰剛痓太陽病㣲熱汗出不惡寒名曰柔痓病原云惡寒其證身熱足寒頭强項急惡寒時頭熱面赤目脉赤獨頭摇卒口噤背反張者痓病太陽病發汗太過因致痓素問曰太陽所至為寢汗痓又云肺熱移於腎𫝊為柔痓始太陽中風發熱而故迫肺金金投子而避對故移熱於胃水水為火迫則上升復凌心位水入火鄉而為郡若汗太多因而熱寐汗反為冷濕之氣復著太陽經故發痓也痓病卧不著席小兒腰背去席二指大人側掌為難治痓病脉弦直上下行仲景云太陽病證其身體几几然脉反沈遲者為欲作痓宜桂枝加栝樓湯栝樓不主中風强項几几其意治肺熱令不能移於腎也桂枝湯内當加栝樓四兩痓病不宜大發汗及針灸宜小汗之柔痓宜桂枝加葛根湯桂枝湯内加葛根四兩剛痓宜葛根麻黄湯方在觧表證中剛柔痓加減葛根麻黄湯葛根麻黄生薑各一兩防風芍藥白术人參芎藭黄芩防已桂枝甘草各半兩附子一個㕮咀水六升先煮麻黄葛根數沸去上沬内諸藥煮取二升去滓飲服一盞食頃再服日四五夜二三柔痓自汗者去麻黄加葛根成一兩半剛痓胷滿口噤卧不著席脚攣急其人必齘齒宜大承氣湯下之方在可下門中濕證太陽病闗節疼痛而煩脉沈緩濕痺之候其人小便不利大便反快只當利其小便宜五苓散方在水證中濕家之為病一身疼發熱身如熏黄仍治風濕脉浮身汗出惡風宜黄耆湯黄耆二兩半防已二兩甘草一兩白术生薑各一兩半棗十六個㕮咀水四升煎至二升去滓温飲一盞食久再服喘者加麻黄一兩胃中不和者加芍藥一兩半氣上衝者加桂枝一兩半下有陳寒者加細辛一兩服後當如蟲行皮中從腰下如氷坐厚被上又以一被繞腰以下令㣲汗出濕家其人但頭汗出背强欲得被覆向火若下之早則噦胷滿小便不利舌上如胎者此丹田有熱胷上有寒渴欲得水而不能飲口燥故也濕家下之額上汗出㣲喘小便不利者死下利不止者亦死問曰風濕相搏一身盡疼痛法當汗出而解值天隂雨不止汗出已解身復痛何也答曰發其汗汗大出者但風氣去濕氣續在是故不愈也若治風濕者發其汗但㣲似欲出汗者風濕俱去也濕家病身上疼痛發熱面黄而喘頭痛鼻塞而煩其脉大自能飲食腹中和無病病在頭中寒濕故鼻塞細末瓜蒂含水畜少許鼻中則愈濕家身煩痛可與麻黄湯内加白术二兩麻黄湯在可汗證中病者一身盡疼發熱日晡則劇者此名風濕此病因傷於汗出當風或久傷於冷所致也可與杏仁薏苡湯麻黄一兩半杏仁四十五枚薏苡仁甘草半兩㕮咀以水二升先煮麻黄一二十沸去上沫内諸藥煮取一升去滓温二三服傷寒八九日風濕相搏身體煩痛不能轉側不嘔不渴脉浮虚而澀者宜桂枝附子湯此治大便自利小便不利者桂枝二兩附子二枚生薑一兩半大棗十二枚甘草一兩㕮咀以水三升煮取一升去滓分温四服若大便堅小便自利者去桂枝加白术二兩煎如前法初一二服身如痺半日許服之都盡其人如冐狀勿怪此乃术附并走皮膚逐水氣未得除故使之耳風濕相搏骨節疼煩掣痛不得屈伸近之則極汗出短氣小便不利惡風不欲去被或有㣲腫者甘草附子湯主之附子二枚白术二兩桂枝三兩甘草二兩㕮咀水三升煮取一升去滓分温三服身腫者加防己二兩悸氣小便不利加茯苓一兩半溢水成四升煎一升三合暍證太陽中熱者暍是也其人汗出惡寒身熱而渴白虎湯加人參主之方在厥隂證中太陽中暍者身熱疼重而脉㣲此夏月傷冷水水行皮中所致也瓜蒂湯主之𤓰蒂二十七枚水半升煮取二合半去滓温服太陽中暍發熱惡寒身重而疼痛其脉弦而細芤而遲小便已洒然毛聳手足逆冷小有勞身即熱口前板齒燥若發其汗則惡寒甚加温針則反熱甚下之則淋甚宜大小橘皮湯大橘皮湯在不可汗證中小橘皮湯主手足冷嘔噦橘皮二兩生薑四兩㕮咀水三升煮取一升半去滓作四服稍熱呷之發汗吐下後雜病證病人脉㣲而濇此乃醫所病大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著複衣冬月盛寒欲裸其體所以然者陽㣲則惡寒隂弱則發熱此醫發其汗使陽氣㣲又大下之令隂氣弱五月之時陽氣在表胃氣虚冷以陽氣内㣲不能勝冷故欲著複衣十一月之時陽氣在裏胃中躁熱以隂氣内弱不能勝熱故欲裸其身又隂脉遲濇故知亡血也此皆可治陽㣲惡寒四逆隂弱發熱為内熱病宜苦酒艾之類大下後復發汗小便不利者亡津液故也勿治之得小便利必自愈發汗後其人臍下悸者欲作奔豚茯苓桂枝湯主之茯苓四兩桂枝二兩甘草一兩大棗八個㕮咀以甘爛水五升先煮茯苓減一升内下諸藥煮取一升半温温作三服作甘爛水法取水二㪷置大盆中以楊柏板擊水上有珠子五六千個相逐取用之發汗或下後痞滿或成寒寔結胷氣塞不通宜檳榔散檳榔二個一生一煨細末酒三盞煎二盞四分作兩服温飲之兼治蚘厥心腹刺痛南海本草治膀胱氣佳龐曰因發汗時汗出如水漏下還復汗少喘促不止脉促而按之濡者合當汗而解脉促而按之實者死若脉浮手足㣲厥面垢脣青昏憒而喘者隂陽未和尚阻升降宜服順隂陽五味子湯麻黄半兩人參五味子麥門冬杏仁橘皮生薑各一分棗七枚㕮咀水二升煮七合去滓通口服一盞未差再作二三服手足厥甚者厚衣䕶其厥下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脉沈㣲身無大熱者宜乾薑附子湯不可作煮散乾薑一兩附子一枚生㕮咀水一升半煎至半升時飲一小盞食久再服傷寒若吐下後心下逆滿氣上衝胷起則頭眩脉沈𦂳發汗則動經身為振振摇者宜茯苓白术湯茯苓二兩桂枝一兩半白术甘草各一兩㕮咀水三升煎至一升半去滓分温四服發汗吐下後虚煩不得眠若劇者必反復顛倒心中懊憹香豉梔子湯主之少氣者加甘草嘔者加生薑梔子香豉湯肥梔子二十枚香豉兩合綿裹水二升煎梔子至一升三合下豉取七合半去滓每進一盞得吐止後服梔子甘草湯前湯内加甘草一兩同梔子煮後下豉如前法加水半升梔子生薑湯前方内加生薑二兩半同梔子煮後下豉同前法加水一升傷寒五六日大下之後身熱不去心中結痛者欲解也屬梔子香豉湯主之用前方下後腹煩滿起卧不安者梔子厚朴湯主之梔子大者八個厚朴二兩枳實二枚㕮咀水二升煮一升去滓温飲一盞傷寒醫以丸藥下之身熱不去㣲煩梔子乾薑湯主之肥梔子八個乾薑一兩以水一升七合煮取八合去滓分温三服凡用梔子湯得效即止後服病人舊有㣲溏不可與之發汗若下之而煩熱胷中窒寒者梔子湯主之傷寒五六日已發汗而復下之胷脇滿㣲結小便不利渴而不嘔但頭汗出往來寒熱煩者此表未解柴胡桂枝乾薑湯主之桂枝黄芩各一兩半柴胡四兩栝樓根二兩乾薑甘草牡蠣各一兩㕮咀水六升煎至三升去滓再煎一升半温温時飲一盞食頃再服傷寒發汗若吐下解後心下痞鞕噫氣不除者旋復花代赭湯主之旋復花甘草各一兩半人參一兩生薑二兩半代赭末半兩棗三枚半夏一兩半㕮咀水五升煎三升去滓再煎取一升半温分四服傷寒若吐下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩飲水至數升者白虎加人參主之方在厥隂證中傷寒八九日下之胷滿煩驚小便不利讝語身重不可轉側者柴胡龍骨牡蠣湯主之柴胡二兩龍骨黄芩生薑鉛丹人參桂枝茯苓牡蠣各三分半夏一合大黄一兩􅀥六個㕮咀水六升煎取三升下大黄切如棊子塊更煎取二升去滓温飲一盞傷寒服湯藥下利不止心下痞鞕服瀉心已復以他藥下之利不止醫以理中與之利益甚理中治中焦此利在下焦以赤石脂禹餘糧湯主之復不止當以五苓散利小便五苓散方在可水證中赤石脂禹餘糧湯赤石脂禹餘糧各八兩水四升煮取二升去滓温飲一盞太陽病外證未除而數下之遂協熱而利利不止心下痞鞕表裏不解者桂枝人參湯主之桂枝甘草各二兩白术人參乾薑各一兩半㕮咀水五升先煮四味取三升内桂更煮取一升去滓温分三服發汗後腹脹滿者厚朴人參湯主之厚朴四兩甘草一兩生薑四兩半夏一兩一分人參半兩以水五升煮取一升半去滓温分三服治頭痛壯熱心中煩黄芩梔子湯黄芩梔子各一兩半石膏乾葛各二兩䜴半兩葱白寸切半斤㕮咀水四升煮取一升半温温作三四服始得病便如前證亦可服治夏月傷暑毒殊驗傷寒發汗後或未發汗頭痛如破宜葱白湯連鬚葱白寸切半斤生薑二兩水二升煮一升去滓温温作二三服服前湯頭痛未解宜葛根葱白湯葛根一兩芍藥芎藭知母各半兩葱白一握寸切生薑一兩㕮咀水二升半煮取一升去滓温温分減服傷寒頭痛立效荆芥散天南星草烏頭肉白者生用荆芥穗各半兩石膏一兩細末每服二錢半陳茶一錢薑汁半呷薄荷三葉水兩盞煎至八分温温相次三服傷寒嘔吐不止惡寒脉細或浮遲宜理中丸兼治霍亂吐利及傷寒後發熱水停喜唾者人參乾薑甘草白术各一兩細末蜜丸雞子黄大每服一丸百沸湯一盞化令細煎三五沸温服之霍亂臍上築者不宜术可作湯去术加桂一兩半水三升煎取八合稍熱服之吐甚去术加生薑一兩半作湯煎如前法飲熱粥一椀㣲温覆之勿發揭衣被有寒腹滿痛或四肢拘急或下利轉筋加生附子二枚作湯服之治傷寒嘔吐欲死生薑半夏湯半夏一兩半生薑一兩水三升半煮一升去滓温温分四服治嘔吐發熱脉滑數或洪者茅根湯茅根半升麥門冬二合半半夏一兩人參半兩茯苓半兩生薑二兩㕮咀水五升煎一升半去滓温温分減服霍亂頭痛發熱身疼多飲水者宜五苓散方在水證中傷寒發熱自利脉浮大數及鼻衂或嘔者宜黄芩芍藥湯黄芩一兩半芍藥甘草各一兩㕮咀水五升煮取一升半去滓分四服嘔者加半夏一兩一分生薑一兩半煎服治傷寒熱痢或兼腹痛黄連當歸丸黄連當歸各三兩乾薑赤石脂各一兩細末蜜丸梧桐子大米飲呑下二三十丸日三夜二服傷寒下利如爛肉汁赤帶下伏氣腹痛諸熱毒悉主之薤白梔子湯豉半升綿裹薤白一握肥梔子大者七個水三升半先煮梔子十沸下薤白煎至二升去滓下豉煮一升半温温分減服必解下惡積傷寒汗解因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得卧此藥解熱毒除酷熱不必飲酒劇者療五日中神效黄連黄蘗湯黄連一兩半黄芩黄蘗各一兩肥梔子十二個㕮咀水三升煎一升二合去滓温温分減服未差更作傷寒四日而大下熱利時作白通諸藥多不得止四順湯熱白通湯苦温除熱止利莫若黄連熟艾湯黄連黄蘗各一兩半龍骨一兩熟艾兩雞子大㕮咀水四升煮一升二合去滓分減温服龎曰凡冷利皆宜四逆冷利臍下必寒水穀黄白色或青黑也熱利臍下必熱利黄赤色也天行熱毒下利赤白久下膿血及下部毒氣當下細蟲如布絲縷大或長四五寸黑頭鋭尾宜麝香丸麝香一錢附子雄黄丹砂乾薑巴豆各二錢搗下篩訖煉蜜和丸小豆大米飲下二丸未知增之此方本無巴豆是古方脱去服之不效今増巴豆試之甚驗傷寒後咳噫肉豆蔲湯肉豆􅅳一個石蓮肉炒茴香各一分丁香半分生薑人參各二分枇杷葉五片拭去毛炙㕮咀水三升煎至一升半分四服空心煖飲之龐曰傷寒汗後咳噫不止是隂陽氣升降欲作汗升之不上降之不下故胃氣上逆而咳噫無休止者宜良薑方橘皮良薑桂枝當歸各一分麻黄半兩檳榔三個杏仁二十個甘草一分生薑一分大棗十個㕮咀水二升半煎至一升去滓下檳榔末又煎三沸去滓通口服一盞未巳再一劑時行頭痛心如醉狀面愛向黒處不欲見人此為壊熱不散速行大青湯與服不爾狂走赶人大青湯大青葉秦芁吳藍升麻薺苨栝樓根各二分甘菊一分石膏三分竹瀝二分朴硝三分㕮咀分二貼每服一貼水二升半煎至一升二合去滓下竹瀝朴硝分温四服肉色黄加茵陳六分面似火加梔子十四枚加水成三升煮取一升半温飲一盞七八日熱盛不解苦葶藶湯苦酒一升半苦葶藶一合生艾汁半升同煎至七合作二服此療内熱病有牛黄一刀圭尤良阬河南曰今諸療疾多用辛甜薑桂人參之屬此皆貴價難得常有必欲求之轉以失時而苦參青葙葶藶子艾之屬所在盡有之除熱解毒最勝向貴價藥也前後數參並用之得病内熱者不必按常藥次也便以青葙苦參艾苦酒療之但少促其間耳無不解者苦酒即米醋也龐曰辛甜薑桂人參之屬是發散寒氣之藥其病未𫝊成内熱者為調治之大要藥也決不可慮其酸苦之藥正治内熱病急要之藥也設當行辛甘而用酸苦設當行酸苦而用辛甘是昧於隂陽之用如此醫殺之耳其辛甘酸苦自是調治通行之要藥若論苦則忌甘論甘則忌苦雖有屢中誠為粗工矣傷寒發黄者先用𤓰蒂末内鼻中口含水搐鼻中去黄水用五苓茵陳散最良時行一切不知身上疼痛不寒亦不熱沈沈似有所思順事多語此藏正𫝊熱麻仁龍膽丸服此藥不死大麻仁大黄各一兩柴胡黄芩白鮮皮秦艽赤芍藥龍膽草各二分黄連一分梔子二十四個細末蜜丸如梧桐子大食後煎淡竹葉湯下三十丸日與三服以大利為度十日小差一月平復地黄湯療傷寒及温病應發汗而不與發汗五内有瘀血者及鼻衂吐血不盡内熱瘀血面黄大便黑者此方主之消化瘀血甚良生濕地黄四兩牡丹皮芍藥犀角屑無以升麻代各半兩㕮咀水二升煮取一升去滓温温飲一盞喜忘如狂者加地黄黄芩各三分加水一升脉大來遲腹不滿自言滿者為無熱不用黄芩也鼻衂或吐血下血黄芩湯黄芩四兩㕮咀水三升煮一升半温飲一盞兼治婦人漏下血不止黄蘗更佳吐血百治不差此方療十差十大黄散地黄汁半升生大黄末一方寸匕煎地黄汁三沸下大黄末調匀空腹服之每温飲一小盞日三服血即止熱病毒氣入眼赤痛生翳不見光明者大黄梔子湯生大黄一兩升麻半兩瞿麥甘草各一分梔子七個㕮咀水二升煎至一升去滓温作四服以利為度難利者煎藥畢下朴硝二分和服先煮諸藥至一升半乃下大黄大黄先以水漬和水下之則折熱易利治毒病入眼忽生赤翳或白或腫膚起或赤痛不得視光熱入心肝或眼浮腫如吹汁出生膜覆珠子或内障不見物良由病後不慎酒麵炙煿五辛所致宜服此頻利之秦皮大黄湯秦皮柴胡常山黄芩升麻芍藥白歛枳實甘草各半兩大黄三分㕮咀水三升煮二升下大黄再煎一升半去滓食後温飲一盞熱盛者加焰硝半兩湯成後下化匀服未差更作可至五七劑又方滴眼湯斑豆瘡不宜用秦皮升麻黄連各半兩細剉水二升煎至一升綿包筯頭揾湯滴入眼中頻頻用之下部䘌瘡雄黄散雄黄青葙子苦參黄連各三分桃仁一分為散以艾汁和丸􅀥核大綿包内下部萹蓄汁更佳冬月無艾濃煎艾汁和為丸更以米飲調下二錢温飲之日二服治䘌瘡青黛丸青黛丁香黄連等分細末甘淀和丸􅀥核大口中有瘡含之咽汁若下部有瘡綿裹内下部日含化五六十丸差牽馬丸治天行四五日下部生瘡醫所不能治此方主之附子一分藜蘆桂枝巴豆各半兩去皮心炒黒二丸未知加三丸熱在鬲上不下飲熱湯半升投吐之下部䘌自差神良天行口瘡黄蘗升麻湯黄蘗升麻甘草生各半兩㕮咀水一升半煮半升入地黄汁一合煎半升分二服細呷之又方薔㣲飲子薔微莖葉切一升冬用根皮水三升煮半升温温漬之去涎喉咽有瘡者嚥汁少許為佳又方黄蘗飲子黄蘗薄切小片蜜漬一宿嚼蘗汁漬瘡又方五倍子散五倍子炒為末傅之涎出吐去以差為度傷寒喉中痛閉塞不通射干煎生射干猪脂各半斤合煎令射干色㣲焦去滓取一􅀥大綿裹含稍稍嚥之治喉咽痛塞硼砂散硼砂殭蠶牙硝白礬甘草雄黄各一分硇砂半分草烏頭尖四個細末米飲調一錢細細呷之古方黑龍煎治咽喉腫痛九種疾人參半兩甘草一兩無灰酒一升不蚛皂角四十條水三㪷浸皂角一宿淨鐺内煎令水減半次下人參甘草細切又同煎三分耗二布絞去滓下酒更入釜煤一小半攪煎如餳稀入甆合内埋地中一宿若用時取一丸如雞頭大盞中以温酒一呷化之先以水潄口以鵝毛㸃藥入喉中掃之有惡涎或自出或下腹可兩三度引藥方歇良乆令吐候惡物出盡了令喫少許水浸烝餅及軟飯粥壓之次含甘草一寸嚥汁忌炙煿胡餅猪肉淹藏等物如木舌難下藥以匙按舌用藥掃喉中九般名急喉閉纒喉風結喉爛喉重舌木舌遁蟲蚛喋飛系入喉元祐五年自春至夏秋蘄黄二郡人患急喉閉十死八九速者半日一日而死黄州潘推官昌言親族中亦死數口後得黒龍膏救活者數十人龐曰急切亦不候合此膏用古方以意處之但得不蚛皂角一兩條槌碎水三升半浸少時揉汁去滓下甘草一分人參一分同煎作稀膏勿令太稠乃下後藥霜梅上白鹽硇砂焰硝各等分三味生研用前膏斟酌和匀可以掃得為度每以鵝毛揾少許如前法掃喉中甚效其將息次第亦如前法此膏得力尤速若日久膏乾以甘草水化之病差後胷喉外生瘡勿疑無鹽梅以白鹽代天行手足腫疼痛皮脱者濃煎虎杖汁漬之天行後毒氣手足腫痛欲脱必作癰膿升麻大黄湯升麻木通白歛各三分黄芩芍藥各一兩甘草半兩大黄一兩半㕮咀水三升煮二升半下大黄煮一升半温温飲一盞利下為度傷寒勞復證病新差後氣血津液衰耗慎勿為諸勞動事凡言語思慮勞神梳沐澡頮勞力則生熱而復病如初也又新差後精髓枯燥切不可為房事犯房事勞復必死魏督郵顧子獻病差後華敷囑之慎勿為勞事餘勞尚可女勞即死此是女勞復非隂陽易也素問云病熱而有所遺者是新差後腸胃尚弱若多食則難消化而復病如初也此是食復新差强人足兩月虚弱人足百日則無復病矣天行勞復頭痛四肢疼葱豉湯葱白豉半升水二升半煎葱爛去滓入雄鼠屎三七枚末之和匀分再服未差更作天行勞復作熱且至晚則腰背痛頭項强重葛根薑豉湯芍藥生薑各一兩半䜴葱白各二合半葛根二兩㕮咀水三升煎二升下豉煎一升半去滓温飲一盞大病差後勞復枳實梔子湯枳實一分肥梔子十二個香豉半升漿水三升煮枳實梔子至二升下豉煮一升半去滓温飲一盞温覆㣲汗食復者加大黄碁子大七枚同煎服之愈療傷寒已差勞復如初脉浮無汗者桂枝梔子湯自汗者去麻黄梔子十二個䜴半升桂枝麻黄各一兩㕮咀水三升煎至二升下豉取一升半去滓温飲一盞温覆取小汗差療傷寒勞復如初自汗出者脉浮滑煩躁甚宜此方梔子石膏香䜴湯梔子十六個石膏四兩香豉一兩綿裹水三升先煮二味至二升半下豉煮取一升半去滓温飲一盞一法湯成入雄鼠矢二七枚末良病未平復後勞動致熱氣攻胷手足拘急搐搦如中風狀𤓰蔞湯𤓰蔞根四兩無黄脉者淡竹茹半斤水三升煮一升二合去滓日二三服温與之婦人病未平復因夫所動小腹篹中急痛腰胯疼四肢不任舉動無熱證者附子黄耆湯白术當歸桂枝附子甘草芍藥人參各半兩黄蓍三分生薑一兩半㕮咀水四升煮至一升半去滓通口服一盞食久再服温覆取小汗男子房勞成復病鼠屎湯薤根一升豭鼠屎二十一個為末矢頭尖硬者是即牡鼠也水三升半煮薤根至一升半去滓下鼠矢末再煎三沸温飲一盞相次三服衣覆必有黏汗為效未汗再作一劑兼治隂陽易神驗男子房勞復發熱口噤臨死舌出數寸又始得病百節痛如被打渾身沈重恍惚失措脉促而絶不可治或有吐涎不止或有譫妄煩亂者皆不可治天行差後勞復發熱嘔吐食不下蘆根湯蘆根半升生薑二兩橘皮枇杷葉各一兩㕮咀水三升煮一升半去滓温飲一盞大效心煩躁加石膏二兩加水一升煮二升隂陽易證隂陽易病者隂陽相感動其毒氣著人如換易也男子病新差女子與之交女子得病名曰陽易女子病新差男子與之交男子得病名曰隂易若二男二女則不相易然女犯男得病鮮有死者男犯女得病救稍緩則十無一人得生者若女犯男男自發勞復則女不病男犯女女自發勞復則男得病亦輕富貴之家雖知其事後生輕於自恣犯之多致不救田野之人䝉蒙昧昧只知傷寒能死人因此病死者十有三四矣皆不知其所犯之由深可傷也男子女人隂陽易病其狀身體疼痛熱上衝胷頭重不能舉眼内生眵四肢拘急小腹絞痛手足拳則暴死其亦有不即死者若小腹裏急熱上衝胷頭重不欲舉百節解離經脉緩弱血氣虚骨髓竭便吸吸氣力轉少著牀不得動起止仰人引嵗月死宜此方足甲裩灰散傷寒總病論卷三

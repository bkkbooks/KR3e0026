front:
  text: 脩治藥法方中有不脩治者今不載
  hash: sha256:acede3e92b94e609c115f287594383490d16d94919418a29fc926699b830ef89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0026_WYG_008-1a, image: WYG0738/WYG0738-0663a.png}
body:
  text: 芍藥赤白利補甘草炙或炒乾薑炮大黄或生或煨芒硝生黄芩不枯者即子芩是也黄連洗去鬚乾葛須家葛乾者梔子去殻橘皮陳者去白生薑薄切桂枝刮去麄皮大棗去核麻黄去根節細辛去苗洗附子去皮尖丸散炮惟湯生用雞子黄藥熟方下阿膠同上吴茱萸湯洗人參去蘆桔梗微炒猪苓去黒皮茯苓赤白利補澤瀉去苗滑石研猪膚去膜切枳實去穠麩炒柴胡去蘆烏梅去核取肉當歸去蘆洗川椒去目及閉口者黄蘗刮去麄皮或酥或蜜炙黄紫色赤小豆浸芽生暴乾惟狐惑證如此麥門冬去心皮石膏研白术去蒂粳米淘杏仁去皮尖麩炒黄為湯劑不炒瓜丁即瓜蒂也龍膽去蘆梁上塵篩過小麥奴即小麥秀出黒者如無炒小麥焦黒飴糖藥熟方下淡竹葉剉半夏湯洗七遍牡蠣粉炒防風去蘆蕘花炒如無以桃花不炒代之竹茹刮淡竹李根甜李根入土者刮去麄皮取白皮細剉五味子去梗厚朴薑炒茵蔯蒿去梗芫花醋拌新瓦上慢火炒焦紫色甘遂濕紙裹煨用赤皮連珠者大㦸炒藁本去苗洗木通刮去麄皮鼈甲去裙肉醋炙焦黄色豉惟湯中以絹袋煮之水蛭水浸去血子米炒蝱蟲去翹足糯米炒桃仁去皮尖麩炒研惟入湯生用蜀漆洗去腥龍骨研朴硝生葶􅏣子隔紙炒研甜者用栝樓焙無黄脈者貝母去心麩炒雄黄研硫黄研大隂𤣥精石味鹹者硝石研代赭杵碎細如入湯用則綿裹地黄汁取自然汁若用濕地黄則切芎藭即川芎漢防己紋如車輪氣連者黄蓍去蘆薏苡仁去殻梹榔半生半煨旋復花去梗赤石脂塊剉禹餘粮槌碎連鬚蔥白寸切荆芥穗去梗茅根洗剉薤白切熟艾炒焦碾末以竹篩篩過麝香研丹砂研肉豆蔲煨石蓮肉炒茴香炒丁香不焙枇杷葉炙刷去毛大青葉去根莖秦艽去蘆吴藍用葉甘菊須家園單葉者或鄧州白菊亦佳竹􅄋淡竹二尺長截兩頭以磚閣起中間火燒兩頭即竹􅄋滴處以椀盛之生艾汁如無以水濃研熟艾亦得牡丹皮去心大麻仁炒鳴取出冷地上攤以新磚磨􅉫去皮以宻篩篩過擇去殻秦皮剉以湯浸頜硯中碧色者真犀角屑懐中令煖即杵碎如無以升麻代之苦參取皮青黛研藜蘆去蘆炙薔薇莖葉切五倍子去肉中蟲炒生射乾去鬚猪脂切硼砂研殭蠶炒須白直者而不濕黒者草烏頭尖去黒皮用之若用鳥頭則皮并尖亦去之炒焦紫色惟荆芥散生用硇砂研白礬枯與礬石同惟鵬砂散生用之牙硝生霜梅上白鹽無以白鹽代之焰硝生薤根切豭鼠矢頭尖硬者蘆根去鬚切葛取粉搗篩取之先乾地黄生乾者躑躅醋炒貝齒燒研石菖蒲去毛獨活去蘆苦酒米醋是也手足指甲棍隱處燒沙參去蘆吴术去皮漏蘆葉無以山梔子代之樺皮細切沈香不焙乳香研真腦子研燈心切桑白皮切紅花子槌碎猪膽用汁菝葜去鬚零陵香去梗栢實去殻研虎頭骨鎊陵鯉甲蝟皮殺鬼丸内生用餘皆炙焦羖羊角鎊樗雞去翹足無即以芫青代之芫青一枚可凖樗雞三枚空青或無以石碌代螢火焙鬼箭取羽去木東門上雞頭焙蒺藜炒以新磚磨去刺鐵錘柄入鐵槌燒焦者車前草切生葛根切羚羊角鎊杵寒水石洗前胡去蘆紫苑去蘆白茅根去鬚洗白薇去苗亂髪皂角水洗以清水洗之羌活去蘆白蘚皮去心生麥門冬去心牛膝去蘆酒浸三宿夏間一宿白石脂燒紫石英光明者研粉霜研龍齒研須極大者虵退皮纒竹樹上慢火炙小麥淘糯米淘茯神去皮木鈎籐皮刮皮鈎蒼术去麄皮青橘皮去白猪牙皂角刮去黒皮或酥或蜜炙牽牛子半生半炒一兩取末半兩入二分枳殻麩炒去穰鹿角屑杵藕汁切研汁生薑汁用自然汁惟不用滓荷葉焙天南星炮惟荆芥散生用不蚛皂角去兩頭及皮子巴豆去皮心膜或炒焦紫色或用湯煮研細壓去油皆可惟茵蔯先生用趙泉黄膏去皮槌碎百合去心如入湯用則水浸一宿折碎去白沫惟石合滑石散麻黄湯末桂枝藥方皆在可發汗證皆秤一半和匀煎服不可作煮散方陽毒升麻湯隂毒甘草湯熱病乾薑附子湯青筋牽柴胡地黄湯赤脈㩌石膏地黄湯黄肉隨𤣥參寒水石湯白氣貍石膏杏仁湯黑骨温苦參石膏湯温􅎪茅根葛根湯梓皮飲子茅根橘皮湯枇杷茅根湯温病壊後三黄石膏湯敗壊别行附子鼈甲湯已上除不可作煮散方外凡湯劑言㕮咀者如㕮咀藕之滓狀今之麄末是也凡麄末每服四錢水皆煎成湯後去滓下之内或用竹􅄋煎者毎四錢水一盞二分煎至七分下竹􅄋三分煎至七分内或用大黄者虚人入大黄同煎之如難得通利人每服四錢水一盞半煎至一盞别入大黄半錢同煎至七分又難得利者以湯浸濃大黄汁三二分同煎之以取利為度政和嵗次癸巳門人布衣魏炳編修治藥法

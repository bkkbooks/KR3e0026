body:
  text: 傷寒總病論醫家類提要臣等謹案傷寒總病論六卷附音訓一卷修治藥法一卷宋龎安時撰安時字安常蘄水人安時本士人習與蘇軾黃庭堅遊第六卷末附與軾書一篇論是編之義甚悉卷首載軾答安時一帖猶從手迹鉤摹形模略具又以黃庭堅後序一篇冠之于前序末稱前序海上人諾為之故虛其右以待署元符三年三月作時軾方謫儋州至五月始移廉州七月始渡海至廉故是年三月猶稱海上人也然軾以是年八月北歸至次年七月即卒于常州前序竟未及作故即移後序為辨首也原本序中剷去庭堅名帖中亦剷去軾名考卷末附載音訓一卷修治藥法一卷題政和癸巳門人董炳編字知正當禁絶蘇黃文字之日諱而闕之此本猶從宋本抄出故仍其舊今悉為補入焉宋史藝文志但載安時難經解前後兩見而不載此書文獻通考載龎氏家藏祕寶方五卷引陳振孫之言謂安時以醫名世者惟傷寒而已此書南城吳炎晦叔録以見遺似乎别為一書而下列庭堅之序與此本同疑當時已無刻本故傳寫互異歟又載張耒一跋云張仲景傷寒論論病處方纖悉必具又為之增損進退之法以預告人嗟夫仁人之用心哉且非通神造妙不能為也安常又竊憂其有病證而無方者續著為論數卷用心為術追儷古人淮南謂安常能與傷寒説話豈不信哉此本未載此跋殆傳寫偶佚歟葉夢得避暑録話頗不滿于安常曾敏行獨醒雜志則記其治泗州守王公弼中丹石毒甚奇又記其治公弼之女尤神異意夢得本蔡京餘黨以安常為蘇黃舊交尚持門户之見歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀傷寒總病論原序龎安常自少時喜醫方為人治病處其死生多驗名傾淮南諸醫然尚氣任俠鬬雞走狗蹴鞠擊毬少年豪縱事無所不為博奕音技一工所難而兼能之家富多後房不出户而所欲得人之以醫聘之也皆多陳其所好以順適其意其來也病家如市其疾已也君脫然不受謝而去中年乃屏絶戲㺯閉門讀書自神農黃帝經方扁鵲八十一難經皇甫謐甲乙無不貫穿其簡䇿紛錯黃帝朽蠹先師或失其意學術淺薄私智穿鑿曲士或竄其文安常悉能辨論發揮每用以治病幾乎十全矣然人疾詣門不問貧富為便房曲齋調護寒暑所宜珍膳美蔬時節其飢飽之度愛老而慈幼不以人之疾嘗試其方如疾痛在已也蓋其輕財如糞土耐事如慈母而有常似秦漢間任俠而不害人似戰國四公子而不爭利所以能動而得意起人之疾不可為數他日過之未嘗有德色也其所揔輯傷寒論皆其日用書也欲掇其大要論其精妙使士大夫稍知之然未嘗遊其庭者雖得吾説而不解若有意于斯者讀其書自足以攬其精微故不著著其行事以為後序云前序海上人諾為之故虛其右以待元符三年三月豫章黃庭堅序軾啓久不為問思企日深過辱存記逺枉書教具聞起居佳勝感慰兼集惠示傷寒論真得古聖賢救人之意豈獨為傳世不朽之資蓋已義貫幽眀矣謹當為作題首一篇寄去方苦多事故未能便付去人然亦不久作也老倦甚矣秋初決當求去未知何日會見臨書惘惘惟萬萬以時自愛不宣再拜安常處士閣下五月草八日人生浮脆何者為可恃如君能著書傳後有幾念此便當為作數百字仍欲送杭州開板也知之知之又白

body:
  text: 傷寒總病論卷二宋龎安時撰可發汗證大法春宜發汗太陽中風陽浮而隂弱陽浮者自發熱隂弱者自汗出嗇嗇惡寒浙浙惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之桂枝芍藥生薑各一兩甘草一兩大棗六个㕮咀水三升半微火煎取一升七合半生布絞去滓温服一盞須臾啜熱粥一椀令助藥力周覆一時汗徧身濈濈者益佳不可令如水流漓病必不除若一服汗出病差止後服不必盡劑也若不汗如前法更服半日許令三服若病重者一日一夜可盡一劑病證猶存者更作服若汗未出乃至二三劑忌生冷粘滑肉麪五辛酒酪臭惡等物太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈按風池是少陽之經陽維之㑹不針天柱而取風池者陽維維諸陽巨陽與諸陽主氣故也龎曰凡桂枝湯證病者常自汗出小便不數手足温和或手足指梢露之則微冷覆之則温渾身熱微煩而又増寒始可行之若病者身無汗小便數或手足逆冷不惡寒反惡熱或飲酒後慎不可行桂枝湯也脉𦂳必無汗設有汗不可誤作桂枝證太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之桂枝湯内加附子一枚炮去皮尖切片同煎如前小便難為有津液可作汗若小便數不可誤認陽旦證也陽旦即桂枝湯異名也下後脉促胷滿者桂枝去芍藥湯主之桂枝湯内去芍藥只用四味也芍藥味酸脉促胷滿恐成結胷故去芍藥之佐全用辛甘發散其毒氣也服桂枝湯或下之仍頭項强痛翕翕熱無汗心下滿㣲痛小便不利者桂枝去桂加白术茯苓各一兩半主之不用桂加水成四升服一升太陽病項背强几几汗出惡風者桂枝加葛根二兩添水成四升煎取二升通治柔痓太陽下之㣲喘者表未解也桂枝加杏仁厚朴湯主之桂枝内加厚朴一兩杏仁四十枚此則中風自汗用桂枝湯證也龐曰惡寒者不當風而憎寒惡風者當風而增寒皆屬表證太陽病頭痛發熱身疼痛骨節煩疼惡風無汗而喘者麻黄湯主之麻黄一兩半桂枝一兩甘草五錢杏仁三十五個㕮咀水二升半煮麻黄數沸去上沫内諸藥煮取一升二合半去滓每飲一盞續次服盡不用粥投温覆如桂枝法將息未汗可再作二三劑龐曰傷寒之脉𦂳盛而按之澀是也脉浮而𦂳浮為風𦂳為寒風傷衛寒傷榮榮衛俱病骨節煩疼外證必發熱無汗或喘其人但增寒手足指末必微厥乆而復温掌心不厥此傷寒無汗用麻黄證凡脉浮數或浮𦂳無汗小便不數病雖十餘日尚宜麻黄湯也太陽中風脉浮𦂳發熱惡寒身痛不汗出而煩躁者大青龍湯主之若脉㣲弱自汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也大青龍湯麻黄三兩桂枝甘草石膏各一兩杏仁二十個棗五枚生薑一兩半㕮咀水五升煮麻黄數沸去上沫内諸藥煮取二升每温飲一盞㣲汗為度若汗周身潤則止服未周身潤可停待少時服盡不欲汗多亡陽故也亡陽遂虚惡風煩躁不得眠也傷寒脉浮緩身不疼但重乍有輕時無少隂證者大青龍湯主之少隂當言太隂按太隂證内有脉浮緩手足温者繫太隂太隂當發證屬青龍湯似桂枝證反無汗而脉𦂳似麻黄證反身不疼而脉浮緩太陽病項背几几無汗惡風葛根湯主之葛根二兩麻黄一兩半桂枝一兩甘草一兩芍藥一兩大棗六枚生薑一兩半㕮咀水四升先煮麻黄葛根數沸去沫下諸藥煮取二升半去滓每温飲一盞日三服如桂枝湯將息太陽與陽明合病必自下利者葛根湯主之太陽與陽明合病不利但嘔者葛根加半夏湯主之用煎葛根湯内加半夏一兩一分湯洗十遍每個作四破龐曰脉浮𦂳無汗服湯未中病其人發煩目瞑極者必衂小衂而脉尚浮者宜麻黄湯衂後脉已㣲者不可再行也凡脉浮自汗服湯不中病桂枝證尚在必頭痛甚而致衂小衂而脉尚浮者再與桂枝湯衂後脉已㣲者不可再行也傷寒三日後與諸湯不差脉勢如數陽氣猶在經絡未入藏府宜桂枝石膏湯此方可夏至後代桂枝證用之若加麻黄一兩可代麻黄青龍湯用之石膏三兩栀子二十四個生薑一兩半桂枝黄芩甘草各一兩升麻葛根各一兩半㕮咀水五升煮取二升半去滓温飲一盞食頃再服若得汗即止後服龐曰凡發汗以辛甘為主復用此苦藥者何也然辛甘者折隂氣而助陽氣也今熱盛於表故加苦以發之素問云熱淫於内以苦發之故也葛根龍膽湯療病四五日不差身體毒熱面赤兼泊陽毒風温葛根生者四兩乾者二兩代生薑升麻大青龍膽桂枝甘草麻黄芍藥各半兩萎蕤一兩石膏一兩半㕮咀水四升半下麻黄煮數沸去上沫内諸藥煎二升去滓温飲一湯盞日三夜二凡葛根須用家園味甘多白粉者為佳若誤用味苦野葛多吐人轉増病時行熱病六七日未得汗脉洪大或數面目赤身體大熱煩躁狂語欲走大渴甚又五六日以上不解熱在胃中口禁不能言為壞傷寒醫所不能治如死人或精神已竭心下微煖發開其口灌藥下咽即活兼治陽毒麥奴丸麻黄三分釜底煤黄芩竈底墨梁上塵小麥奴竈中黄土各一分芒硝大黄各半兩細末蜜丸彈子大新汲水三合和一丸研服之渴者但令冷水足意飲之須臾當寒竟汗出便差若日移五尺不汗依前法再服一丸差即止須㣲利小麥奴乃小麥未熟時叢中黒麥捻之成黒勃者是也無即以小麥炒黒焦地上出火毒用之亦得此藥須是病人大渴倍常躁盛若小渴者强與之為禍耳强人每服半雞子大亦治瘟瘧傷寒連服發汗湯七八劑汗不出者死如中風法蒸之使温熱之氣外迎無不得汗也古今用效薪火燒地良久去火掃地以水洒之取𧖟沙桃柏荆葉糠及麥麩皆可同和鋪燒地上可側手厚上鋪席令病人卧席上温覆之熱月只可夾被覆其汗立出後周身至脚心皆汗濈濈乃用温粉撲止移之上牀即愈無𧖟沙即用麩糠之類鋪燒地上亦得温粉法白术藁本白芷各二兩末之入英粉十二兩和勻用之無英粉以蜯粉代之傷寒差後有不了了證者謂至十日或半月二十日終不惺惺常昏沉以失精神言語錯謬或無寒熱有似鬼祟或朝夕潮熱頰赤或有寒熱如瘧狀此乃發汗不盡餘毒氣在心胞絡間所致也宜知母麻黄湯知母一兩半麻黄一兩芍藥黄芩甘草桂枝各半兩㕮咀水二升半煮麻黄數沸去上沫内諸藥取一升三合去滓每温飲一大盞半日可相次三服温覆令㣲汗若心煩欲水當稍與之令胃中和則愈未汗盡劑太陽病下之後氣上衝其脉必浮可依證發汗不與汗則成結胷也凡發汗脉浮大雖大便秘小便少者可發汗而解也合汗不汗諸毛孔閉塞悶絶而死不可發汗證脉浮𦂳法當身痛當以汗解假令尺中脉遲為榮氣不足血少故也前陽明病脉遲汗出多㣲惡寒宜桂枝湯不責榮不足蓋尺脉長大而遲也此必軟𦂳而遲不可汗宜小建中湯小建中湯桂枝三分生薑三分芍藥一兩半甘草半兩棗六枚飴糖兩合半㕮咀水二升半煮取九合去滓方下飴糖煎令化每温飲一湯盞日進二三服尺尚遲再作一劑入人參加半兩同煎最良舊有㣲溏或嘔者不用飴糖也兼治傷寒一二日胷中悸而煩及汗後身疼脉沉遲又治傷寒陽脉澀隂脉弦法當腹中急痛先小建中湯不差與柴胡湯方在和表證中龐曰凡脉𦂳病必無汗唯濡而𦂳病必自汗勿誤行桂枝宜建中湯也脉濡弱不可發汗汗則厥而煩躁不得眠諸動氣在心腹上下左右不可發汗龐曰諸脉動數㣲弱不可發汗以上並宜建中湯若煩躁者宜竹葉湯竹葉湯治虚煩病似傷寒身亦熱而煩躁頭不痛身不疼脉不數者兼治中暍渴吐逆而脉滑數者及傷寒解後虚羸少氣氣逆欲吐者並宜服之淡竹葉半把石膏四兩半夏三分人參半兩甘草半兩麥門冬二兩粳米一合淘過細剉以水五升煎二升半米熟去滓温飲一盞日進三服夜二服嘔者加生薑一兩半不嘔不用虚煩或嘔吐脉弦細芤遲手足㣲寒胷滿者橘皮湯主之兼治暴煩下利方在太隂證中四逆不可發汗發汗則聲嘶舌萎不得前言亂睛眩者命將難全咽中閉塞不可發汗發汗則吐血氣㣲絶手足不能自温者乾薑甘草湯主之方在太隂證中淋家不可發汗發汗必便血瘡家雖身痛不可發汗汗出則痙以癰瘡家膿血過多動氣在右不可發汗汗出則衂而渴心苦煩飲則吐水動者謂心腹中虚氣動若誤汗有此證先宜五苓散三服方在可水證中次服竹葉湯方在前動氣在左不可發汗發汗則頭眩汗出則筋惕肉瞤此為逆難治但先服防風白术散次服建中湯方在前防風白术散防風一兩牡蠣粉半兩白术三分細末温米飲調下二錢日二三服汗出續與建中湯動氣在上不可發汗發汗則氣上衝正在心端李根湯主之半夏半兩桂枝當歸芍藥黄芩甘草人參各一分茯苓三分粗末每五錢水兩盞薑三片甘李根白皮一團如雞子黄大煎八分通口日三五服動氣在下不可發汗發汗則心中大煩骨節苦痛目運惡寒食則反吐穀不得前先服大橘皮湯得吐止後服建中湯大橘皮湯亦主手足冷嘔􅎪橘皮一兩半生薑二兩棗二十四個甘草半兩人參一分竹茹半兩㕮咀水三升煎一升半去滓温服一盞食頃再服不當汗而强汗之則津液枯槁而死四逆證四逆湯治病發熱頭痛脉反沉若不差身體疼痛者脉浮遲表熱裏寒下利清穀者汗出熱不去内拘急支節疼四逆者下利厥逆惡寒者下利腹脹滿身疼脉浮者先用四逆温裏得利止乃可隨證用藥攻表也甘草一兩附子半個乾薑三分㕮咀以水一升半煮取六合去滓温分作二服手足厥脉微欲絶者當歸四逆湯主之當歸桂枝芍藥細辛各一兩半棗三十六個甘草木通各一兩㕮咀以水四升半煮二升二合去滓每温一盞服和表證傷寒表不解心下有水氣乾嘔發熱而欬或渴或利或噎或小便難腹滿而喘者小青龍湯主之麻黄芍藥細辛乾薑甘草桂枝各一兩半半夏三分五倍子半兩㕮咀以水六升先煮麻黄數沸去上沫内諸藥煮一升去滓每温服一盞若渴者去半夏加括樓根一兩半若㣲利去麻黄加蕘花一雞子大炒赤若噎者去麻黄加附子一枚炮小便不利小腹滿者去麻黄加赤茯苓二兩若喘去麻黄加杏仁一兩一分無蕘花以桃花一鴨子大不炒代之太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脉微緩者為欲愈也脉㣲而惡寒此隂陽俱虚不可更發汗吐下也面色反有熱色者未解也以其不能得小汗出其身必痒宜桂枝麻黄各半湯桂枝湯末麻黄湯末各三分以水一升半棗三個生薑三片煎减半去滓温飲一盞未有小汗再服之服桂枝湯大汗出脉洪證候不改者服桂枝湯如前法若形似瘧狀日再發者宜桂枝二麻黄一湯桂枝湯末一兩麻黄湯末半兩以水一升半薑三片棗三個煎减半去滓温飲一盞未有小汗再服之服桂枝湯大汗出後大煩渴脉洪大者白虎湯加人參主之方在厥隂證中龐曰傷寒已得汗身和脉弦細讝語妄見此為津液不和與小柴胡去人參加桂枝湯服之津液和自愈未差與調胃承氣湯下之傷寒六七日發熱㣲惡寒支節煩疼㣲嘔心下支結外證未去柴胡桂枝湯主之兼治寒疝腹痛柴胡一兩桂枝黄芩人參各半兩半夏四錢芍藥半兩甘草一錢一字大棗九枚生薑半兩㕮咀以水三升半煮取一升七合半去滓温飲一盞小柴胡湯治傷寒五六日中風往來寒熱胷脅滿嘿嘿不欲食心煩喜嘔或胷中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身㣲熱或欬者柴胡二兩甘草黄芩人參各三分半夏六錢一字生薑三分大棗三枚㕮咀以水六升煮取三升去滓再煎取一升半温作三服若胷中煩而不嘔者去半夏人參加括樓半個若渴去半夏加人參成二兩二錢半括樓根二兩若腹中痛去黄芩加芍藥一兩半若脇下痞鞕去大棗加牡蠣二兩若心下悸小便不利去黄芩加茯苓二兩若不渴外有㣲熱去人參加桂枝一兩半温覆㣲汗愈若欬去人參大棗生薑加五味子一兩一分乾薑一兩傷寒中風有柴胡證但見一證不必悉具凡以柴胡證而下之與柴胡湯必蒸蒸而振却復發熱汗出而解也病十日以上脉浮細嗜卧者為己安候小柴胡和之細而遲者勿與婦人中風七八日續自寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人傷寒發熱經水適來晝則明了暮則讝語如見鬼狀此為熱入血室無犯胃氣必自愈先宜小柴胡湯不愈可刺期門婦人中風發熱惡寒經水適來得之七八日熱除而脉遲身涼胷脇下滿如結胷狀讝語此為熱入血室也當刺期門隨其實取之陽明病潮熱大便溏小便自如胷脇滿不去者小柴胡湯主之又不大便而嘔舌上白苔者亦宜服之上焦得通津液得下胃氣因和身濈然汗出而解陽明中風脉浮弦大而短氣腹滿脇下及心痛久按之氣不通鼻乾不得汗嗜卧一身及目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脉續浮者與小柴胡湯若不尿腹滿加噦者不治可下證血證附大法秋宜下陽明病發熱不惡寒汗多者急下之凡脉沉細數為熱在裏又兼腹滿咽乾或口躁舌乾而渴者或六七日不大便小便自如或目中瞳子不明無外證者或汗後脉沉實者或下利三部脉皆平心下堅者或連發汗已不惡寒者或已經下其脉浮沉按之有力者宜大承氣湯大黄半兩厚朴一兩枳實一枚朴硝半兩㕮咀以水四升先煮厚朴枳實至三升下大黄煮取一升半去滓下朴硝烊化每温一盞服利即止後服如作煮散煎每服厚朴枳實末共三錢水兩盞煎一盞半下大黄末一錢煎一盞絞去滓下朴硝末一錢烊化服之陽明與少陽合病而利脉不負者為順也負者失也弦相克為負也脉滑而數者有宿食當下之宜大承氣湯陽明土其脉大少陽木其脉弦若合病土被木賊克更利為胃已困若脉不弦為土不負弦者為土負必死脉雙弦而遲心下堅或脉大而𦂳者陽中有隂可下之病者煩熱汗出如瘧狀日晡則發潮熱者屬陽明其脉必實當下之而愈病人小便不利大便乍難乍易時有㣲熱喘冐不能卧者有躁屎宜下之傷寒若吐下後不解不大便五六日以上至十餘日日晡則發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣妄撮常見有此撮空候故改之惕而不安㣲喘直視脉弦者生脉濇者死㣲者但發熱讝語可下之一服利止後服過經讝語者可下之病人不大便五六日繞臍痛煩躁發作有時此有躁屎故不大便可下之以上並宜大承氣湯太陽病未解其脉隂陽俱停者必先振慄汗出而解陽㣲者先汗之而解隂實者先下之而解下之宜大柴胡湯柴胡四兩黄芩芍藥各一兩半枳實二枚生薑二兩半半夏一兩一分大棗六個大黄一兩㕮咀以水六升煮取三升去滓再煎每温一盞服因下之後潮熱而㣲利者此醫以丸藥下之非其治也而有表證仍胷鬲滿而嘔者先服小柴胡湯後服大柴胡湯小柴胡湯在和表證中傷寒發熱汗出不解心中痞鞕嘔吐下利者大柴胡湯主之傷寒十餘日結熱在裏往來寒熱者宜大柴胡湯陽明病讝語發潮熱脉滑疾者小承氣湯主之大黄二兩厚朴一兩枳實兩枚㕮咀水二升半煎至八合去滓放温時飲一盞以利為度凡大便秘悶恐有表證者但少少飲之㣲下為度不可飲多恐大泄利也虚弱人可作煮散煎服太陽病若吐下發汗後㣲煩小便數大便難者與小承氣湯利之則愈此太陽陽明證也下利讝語者有燥屎也宜小承氣湯初一服讝語止若更衣者停後服不爾盡與之更衣即登厠也非顔師古注漢書更衣之義集驗方痒有更衣挺出頗妨於更衣更衣出清血故以知之陽明病不吐不下心煩者可與調胃承氣湯方在太陽證中發汗後惡寒者虚也不惡寒但熱者實也當和其胃氣宜調胃承氣湯傷寒十三日過經讝語者此有熱當以湯下之若小便利者大便當鞕反下利而脉調和者知醫以丸藥下之非其治也若自下利者脉當㣲厥今反和者為内實也宜調胃承氣湯太陽病過經十餘日心下温温欲吐而胷中痛大便反溏腹㣲滿欝欝㣲煩此時極吐下者與調胃承氣湯不爾不可與之但欲嘔胷中痛㣲溏者此非柴胡證以嘔故知極吐下也屬調胃承氣湯傷寒吐後腹脹滿者屬調胃承氣湯茵陳湯治陽明病發熱汗出者此為熱越不能發黄也但頭汗出其身無汗齊頸而還小便不利渴而飲水者以瘀熱在裏身必發黄茵蔯蒿三兩大黄一兩半栀子二十個大者七枚㕮咀水二升半先煮茵蔯至二升内二味煮取一升二合半去滓温飲一盞日三服小便當利尿如皂角汁一宿腹減黄從小便出十棗湯治太陽病中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿脇下痛乾嘔短氣汗出不惡寒者此表和裏未和也芫花甘遂大㦸等分異杵篩秤末合之入臼再杵二三百下先以水一升煮肥棗十枚擘碎煮取半升去棗用煎湯少半調末一錢匕羸人半錢再單飲棗湯送之平旦服若下少而病不除明旦加藥一錢半如前服之服之必利利後糜粥自養欬而脇下痛此為有飲宜十棗湯調中湯治夏月及秋初忽有暴寒折於盛熱熱結四支則壯熱頭痛寒傷於胃下利或血或水或赤帶下壯熱且悶脉數宜下之久年腸風下之亦差大黄三分葛根黄芩芍藥桔梗茯苓藁本白术甘草各半兩㕮咀水三升煎至二升下大黄取一升二合去滓温温飲一盞移時勿鬲食再服之得快下壯熱便歇其下利亦止凡秋夏旱熱積日或有暴寒折之熱無可散喜搏著肌中作壯熱氣也胃為六府之表最易為暴寒所折故也虚人亦不在壯熱但主利或霍亂不宜用此實人有服玉石人喜壯熱與别藥下則加熱喜悶而死矣是以宜以此下和其胃氣調中湯又治陽病因下遂陽熱利不止及傷寒不因下而自利表不解脉浮數者皆可去大黄加葛根成一兩煎服之殊驗也茵陳丸療瘴氣及黄病㾬瘧茵陳梔子鼈甲芒硝各一兩大黄二兩半豉二合半常山杏仁各一兩半巴豆半兩細末蜜丸梧桐子大初得時氣三日内平旦米飲服二丸如人行十里久或吐或利或汗出不爾更服一丸以熱粥投之老少以意加減丸數服若黄病痰癖時氣傷食㾬瘧小兒驚熱欲發癎服之無不差者療瘴神驗赤白痢服之亦效春初有宿熱依上法服之取吐利當年不憂熱病有性殺藥者每服七九五丸抵黨湯治太陽病六七日表證在脉㣲而沉反不結胷其人發狂者乃熱在下焦小腹當鞕滿小便反利者下血乃愈所以然者以太陽隨經瘀血在裏故也小腹滿而小便不利者非血證水蛭蝱蟲各十枚桃仁七個大黄一兩㕮咀以水二升半煮至一升二合半去滓温温分四服未下再服虚人只可作半料服之如作煮散每五錢水一盞半煎一盞去滓服之桃仁承氣湯治太陽病不解熱結在膀胱其人如狂血自下者乃愈其外不解者尚未可攻當先隨證行湯解外外已解但小腹急結者乃可攻之不惡寒為外解桃仁二十四個大黄二兩甘草桂枝芒硝各一兩㕮咀以水三升半煎取一升半去滓内芒硝烊化温服一盞虚人減作半料亦可作煮散每五錢水一盞半煎至一盞去滓下芒硝一錢半烊化服之桃仁承氣湯又治産後惡路不下喘脹欲死服之無不差者龐曰脉朝夕駛者實癖也可下之朝平夕駛者非癖也不可下駛謂數脉六七至者也若脉數一息八九至慎不可下若下之則煩躁下利不止而死凡數脉與皮毛相得亦不可下也合下不下令病人腹脹滿通身浮腫而死不可下證脉軟而弱弱反在闗關下三分也濡反在顛闗上三分也㣲反在上寸口也澀反在下尺部也微則陽不足澀則無血陽氣反微中風汗出而反煩躁澀則無血厥而且寒宜建中湯方在不可汗證中陽微不可下下之則心下痞諸動氣在心腹上下左右俱不可下動氣在右不可下下之則津液内竭咽躁鼻乾頭眩心悸宜竹葉湯方在不可汗證中動氣在左不可下下之則腹裏拘急不止動氣反劇身雖有熱反欲勌先服乾薑甘草湯方在太陽證中後服建中湯方在不可汗證中動氣在上不可下下之則掌握熱煩身冷熱汗自泄欲水自灌竹葉湯主之方在不可汗證中動氣在下不可下下之則腹滿卒起頭眩食則下清穀心下痞堅半夏㵼心湯主之方在痞證中咽中閉塞不可下龐曰諸脉濡弱㣲細相搏俱不可下諸四逆不可下虚家亦然龐曰若下證悉具而見四逆者是失下後氣血不通使然但手足微厥掌心常温時復指梢温便下之不可拘忌也傷寒嘔多雖有陽明證不可攻也龐曰凡下證小便不利或尚少未可攻之也不當下而强下之令病人腸胃洞泄不禁而死可水不可水證龐曰凡病非大渴不可與冷水若小渴口咽乾小小呷滋潤之若大渴煩躁甚能飲一斗者與五升能飲一升者與半升若乃不與則乾躁無由作汗煩喘而死者多矣但勿令足意飲也若大汗將來躁渇甚者但足意飲之勿疑常人見因渴飲水而得汗見小渴遂强與之致停飲心下滿結喘而死者亦多矣其有熱脉數尚可作汗而解者出於天幸也五苓散治病人水藥入口則吐或渴而嘔者或汗後脉尚浮而煩渴者或下利渴而小便不利者或因渴停水心下短息者難治嘔而小便不利者皆主之猪苓白术茯苓桂枝澤㵼各半兩細末白飲調下二錢日三服數飲煖水汗出效陽明病小便數者大便即堅不更衣十日無所若欲飲水但與之當以法救渴者五苓散主之霍亂頭痛發熱身體疼發熱欲飲水五苓散主之若得病無熱但狂言煩躁不安精采不與人相當勿以火導之但以豬苓散方寸寸服之當逼飲新汲井水一升即令指刺喉中吐去之病隨手愈若不能吐者勿强與水水停則結心下也當以藥吐之不爾更致危病若當吐不時以豬苓散吐之其死迨速矣亦可針之尤佳夫飲鬲實難治此皆三死一生也太陽病發汗後大汗出胃中乾燥煩不得眠其人欲飲水者但與之當稍稍飲之令胃和則愈可吐不可吐證龐曰胷鬲痞悶痰壅塞礙脉得浮或滑並宜瓜蒂散吐之方在厥隂證中産後六七日内下㵼諸藥不効得此脉與吐之㵼立止下利日數十行其脉反遲寸口微滑吐之則止龐曰虚家當吐而不敢吐之宜以枳實散壓氣毒痰水過日毒入胃乃可微下之也諸四逆脉㣲弱虚細或弦遲雖中滿悶不可吐宜橘皮湯枳實散之類橘皮湯在和表證中枳實散在叙論中不可吐而强吐之氣築心即死矣可灸不可灸證燒灸令其汗針處被寒核起而赤者必發賁豚氣從少腹上撞者灸其核上一壯與桂枝加桂湯桂枝湯内加桂枝足成一兩一分如前法煎之少隂病其人吐利手足不逆反發熱不死灸少隂七壯下利手足厥無脉灸之不煖反微喘者死傷寒脉促手足厥逆可灸之合灸不灸令病人冷結久而彌固氣衝心而死㣲之脉慎不可灸因火為邪則為煩逆追虚逐實血散脉中火氣雖㣲内攻有力焦骨傷筋血難復也脉浮當以汗解而反灸之邪無從去因火而盛病從腰以下必當重而痺此為火逆若欲自解當先煩煩乃有汗隨汗而解何以知之脉浮故以知汗出而解脉浮熱甚而灸之此為實實以虚治因火而動咽躁必唾血不當灸而誤灸令火邪入腹千錯五藏重加煩而死可火不可火證下利穀道中痛當以熬鹽末熨之或炒枳實末温熨二味相兼益佳若臍下冷結不可便熨冷氣攻心腹必死須先用藥温之久而可熨凡臍下冷結成開隂大小便不通服藥雖多不見效以炒鹽熨臍下須臾即通然開隂已服巴豆甘遂大黄輕粉之類太多即暴通利而損人尤宜詳之也可温證大法冬宜温熱藥少隂病其人飲食入則吐心中温温欲吐復不能吐始得之手足寒脉弦遲若鬲上有寒飲乾嘔者不可吐宜四逆湯温之方在四逆證中下利其脉浮大此為虚以强下之故也設脉浮大因爾腹鳴宜當歸四逆湯温之方在四逆證中火邪證醫以火卧牀下或周身用火迫却作或熨或誤炙皆屬火邪也傷寒脉浮醫以火迫劫之亡陽驚或狂起卧不安者宜桂枝去芍藥加蜀漆牡蠣龍骨救逆湯桂枝一兩半蜀漆一兩半甘草一兩龍骨二兩牡蠣二兩半生薑一兩半大棗六枚以水六升先煮蜀漆減一升内諸藥煮取二升去滓温服一盞無蜀漆以恒山代之火劫後脉浮當汗出而愈火邪下之因燒針煩躁者桂枝甘草湯主之桂枝半兩甘草牡蠣龍骨各一兩以水二升煮一升去滓温取一盞可代救逆湯使之龐曰灸及燒針後證似火劫者並宜火劫治之煩躁驚及狂用六石風引湯尤良柴胡加龍骨牡蠣湯亦通用病人因火劫至十五六日身黄下利狂欲走師脉之言當下清血如豚肝乃愈後如師言何以知之師曰寸口脉陽浮而隂濡弱陽浮為風濡弱為虚浮虚受少血發熱惡寒洒淅項强頭眩醫以大熏鬰令汗出惡寒遂甚客熱因火而發怫鬱蒸於肌膚自為黄小便㣲難短氣鼻中出血而復下之胃無津液利遂不止熱瘀在膀胱畜結成積狀如豚肝當下不下心亂迷憒狂走赴水必不能自制蓄血若去目明心了此皆醫所為輕者得愈極者不治傷寒總病論卷二
